name: Generate JSON
on:
  push:
    paths:
      - '**.html'
  workflow_dispatch:  # <--- এই লাইনটি যোগ করলেই বাটনটি আসবে!

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Generate JSON
        run: |
          echo '{"effects": [' > all-effects.json
          # প্রতিটি HTML ফাইলের নাম থেকে JSON এন্ট্রি তৈরি হবে
          find . -maxdepth 1 -name "*.html" -printf '{"id": "%f", "title": "%f", "url": "https://foodyshagor-prog.github.io/effect-templates/%f"},' | sed 's/,$//' >> all-effects.json
          echo ']}' >> all-effects.json
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add all-effects.json
          git commit -m "Auto-update JSON from GitHub Actions" || echo "No changes to commit"
          git push
