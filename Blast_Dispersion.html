<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blast Dispersion Editor</title>
    <style>
        :root {
            --primary: #ff4757; /* Fiery red/coral accent for the blast effect */
            --bg-top: #2f1e25;
            --bg-bottom: #0b0b12;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .canvas-container {
            width: 100%;
            height: 40vh;
            background: #ffffff; /* White base to handle transparent images */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        .placeholder-text {
            position: absolute;
            color: #888;
            font-size: 0.9rem;
            pointer-events: none;
            font-weight: 500;
        }

        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            padding-bottom: 10px;
        }

        .slider-group {
            background: var(--surface);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .slider-header span {
            color: var(--primary);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .btn-upload {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-save {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Blast Dispersion</h1>
    </div>

    <div class="canvas-container">
        <span class="placeholder-text" id="placeholderText">No Image Selected</span>
        <canvas id="editorCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="slider-group">
            <div class="slider-header">
                <label>Blast Spread</label>
                <span id="spreadVal">50%</span>
            </div>
            <input type="range" id="spreadAmount" min="0" max="100" value="50">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>Particle Size</label>
                <span id="sizeVal">15px</span>
            </div>
            <input type="range" id="particleSize" min="5" max="30" value="15">
        </div>

        <div class="btn-group">
            <label class="btn btn-upload">
                Load Image
                <input type="file" id="imageLoader" accept="image/*"/>
            </label>
            <button id="saveBtn" class="btn btn-save">Save Image</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const imageLoader = document.getElementById('imageLoader');
        
        // UI Elements
        const spreadAmount = document.getElementById('spreadAmount');
        const particleSize = document.getElementById('particleSize');
        const spreadVal = document.getElementById('spreadVal');
        const sizeVal = document.getElementById('sizeVal');
        const placeholderText = document.getElementById('placeholderText');
        const saveBtn = document.getElementById('saveBtn');

        let currentImage = null;
        let particles = [];
        let renderTimeout;

        // Configuration
        const MAX_PARTICLES = 3000;
        const CANVAS_MAX_WIDTH = 1000;

        // Image Load Handler
        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    placeholderText.style.display = 'none';
                    
                    // Scale down for mobile performance
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > CANVAS_MAX_WIDTH) {
                        height = Math.round((height * CANVAS_MAX_WIDTH) / width);
                        width = CANVAS_MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;

                    buildParticleSystem(width, height);
                    applyEffect();
                }
                img.src = event.target.result;
            }
            if(e.target.files && e.target.files[0]){
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Generates the array of geometric pieces
        function buildParticleSystem(w, h) {
            particles = [];
            
            // Draw image to invisible canvas to read pixels
            const offCanvas = document.createElement('canvas');
            offCanvas.width = w;
            offCanvas.height = h;
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
            offCtx.drawImage(currentImage, 0, 0, w, h);
            
            const imgData = offCtx.getImageData(0, 0, w, h).data;

            let attempts = 0;
            while(particles.length < MAX_PARTICLES && attempts < MAX_PARTICLES * 3) {
                attempts++;
                
                // Bias particles towards the right side of the image (where the blast happens)
                // Using Math.pow creates a curve that favors the right edge
                const x = Math.floor(Math.pow(Math.random(), 0.5) * w);
                const y = Math.floor(Math.random() * h);

                const index = (y * w + x) * 4;
                const r = imgData[index];
                const g = imgData[index + 1];
                const b = imgData[index + 2];
                const a = imgData[index + 3];

                // Skip transparent pixels or pure white background pixels
                if (a < 50 || (r > 240 && g > 240 && b > 240)) continue;

                // Physics attributes for each particle
                particles.push({
                    x: x,
                    y: y,
                    color: `rgb(${r},${g},${b})`,
                    // Velocity mapping: push right and scatter up/down
                    vx: Math.random() * 200 + 50, 
                    vy: (Math.random() - 0.5) * 150,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 4,
                    scaleOffset: Math.random() * 0.5 + 0.5,
                    shape: Math.random() > 0.5 ? 3 : 4 // Triangles or squares
                });
            }
        }

        function drawShape(ctx, x, y, size, rotation, shapeType) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.beginPath();
            
            if (shapeType === 3) { // Triangle
                ctx.moveTo(0, -size);
                ctx.lineTo(size * 0.866, size * 0.5);
                ctx.lineTo(-size * 0.866, size * 0.5);
            } else { // Square/Diamond
                ctx.moveTo(-size/2, -size/2);
                ctx.lineTo(size/2, -size/2);
                ctx.lineTo(size/2, size/2);
                ctx.lineTo(-size/2, size/2);
            }
            
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        // The Core Render Loop
        function applyEffect() {
            if (!currentImage || particles.length === 0) return;

            const spread = spreadAmount.value / 100; // 0.0 to 1.0
            const baseSize = parseInt(particleSize.value);

            // Update UI Labels
            spreadVal.innerText = spreadAmount.value + '%';
            sizeVal.innerText = baseSize + 'px';

            const w = canvas.width;
            const h = canvas.height;

            // 1. Clear Canvas (White background)
            ctx.clearRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            // 2. Draw Original Image
            ctx.drawImage(currentImage, 0, 0, w, h);

            // 3. Mask the original image to make it look "eaten away"
            if (spread > 0.05) {
                ctx.globalCompositeOperation = 'destination-out';
                const maskGradient = ctx.createLinearGradient(w * 0.4, 0, w, 0);
                
                // As spread increases, the mask eats further left into the image
                const maskEnd = 1 - (spread * 0.8);
                
                maskGradient.addColorStop(0, 'rgba(0,0,0,0)');
                maskGradient.addColorStop(maskEnd, 'rgba(0,0,0,1)');
                
                ctx.fillStyle = maskGradient;
                ctx.fillRect(0, 0, w, h);
            }

            // 4. Draw Particles over the top
            ctx.globalCompositeOperation = 'source-over';
            
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                // Calculate position based on spread slider
                const currentX = p.x + (p.vx * spread);
                const currentY = p.y + (p.vy * spread);
                const currentRot = p.rotation + (p.rotSpeed * spread);
                
                // Particles get slightly smaller as they disperse further
                const currentSize = baseSize * p.scaleOffset * (1 - (spread * 0.4));

                ctx.fillStyle = p.color;
                drawShape(ctx, currentX, currentY, currentSize, currentRot, p.shape);
            }
        }

        // Debounce sliders to keep mobile UI buttery smooth
        function queueEffect() {
            cancelAnimationFrame(renderTimeout);
            renderTimeout = requestAnimationFrame(applyEffect);
        }

        spreadAmount.addEventListener('input', queueEffect);
        particleSize.addEventListener('input', queueEffect);

        // Handle File Saving
        saveBtn.addEventListener('click', function() {
            if (!currentImage) {
                alert("Please load an image first.");
                return;
            }
            
            // Bridge this output to your native Android/iOS WebView handler if standard download fails
            const dataURL = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = 'blast-dispersion.jpg';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
