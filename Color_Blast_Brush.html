<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Blast Brush Effect</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            touch-action: none; /* Prevents mobile scrolling when brushing */
            background-color: #111;
        }

        .empty-state {
            position: absolute;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        .toolbar {
            height: 90px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: #a1a1aa;
            font-size: 12px;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn .icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        .btn.active {
            color: #fff;
        }

        .btn.active .icon {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
            color: white;
        }

        .btn:active {
            transform: scale(0.92);
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">Blast Editor</div>

    <div class="canvas-container">
        <div class="empty-state" id="emptyState">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 10px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <br>Upload an image to start
        </div>
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="toolbar">
        <input type="file" id="fileInput" accept="image/*">
        
        <button class="btn" id="uploadBtn">
            <div class="icon">📸</div>
            <span>Upload</span>
        </button>

        <button class="btn active" id="brushBtn">
            <div class="icon">🖌️</div>
            <span>Brush</span>
        </button>

        <button class="btn" id="autoBlastBtn">
            <div class="icon">💥</div>
            <span>Auto Blast</span>
        </button>

        <button class="btn" id="saveBtn">
            <div class="icon">💾</div>
            <span>Save</span>
        </button>
    </div>

    <script>
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const emptyState = document.getElementById('emptyState');
        
        let currentImage = null;
        let isDrawing = false;
        let isBrushActive = true;

        // Vibrant splash colors inspired by your reference image
        const blastColors = ['#FF1493', '#00FFFF', '#FFD700', '#32CD32', '#FF4500', '#8A2BE2', '#FFFFFF'];

        // Upload Button Logic
        document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Set actual canvas resolution to image resolution for high-quality saving
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    currentImage = img;
                    emptyState.style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Brush / Touch Logic
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            // Handle both touch and mouse events
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Map CSS display size to actual Canvas internal resolution
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function drawSplatter(x, y) {
            if (!currentImage) return;

            const color = blastColors[Math.floor(Math.random() * blastColors.length)];
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            
            // Using screen composite makes the colors pop brightly against dark backgrounds
            ctx.globalCompositeOperation = 'screen';

            // Scale splash size based on canvas resolution to keep it proportionate
            const baseSize = canvas.width * 0.02; 

            // Draw central blob
            ctx.beginPath();
            ctx.arc(x, y, Math.random() * baseSize + (baseSize/2), 0, Math.PI * 2);
            ctx.fill();

            // Draw scattered droplets
            const splashCount = Math.floor(Math.random() * 12) + 5;
            for(let i = 0; i < splashCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * (baseSize * 4) + (baseSize);
                const splashX = x + Math.cos(angle) * distance;
                const splashY = y + Math.sin(angle) * distance;
                const radius = Math.random() * (baseSize * 0.4) + 1;

                ctx.beginPath();
                ctx.arc(splashX, splashY, radius, 0, Math.PI * 2);
                ctx.fill();

                // Occasional paint streaks connecting to the center
                if (Math.random() > 0.6) {
                    ctx.lineWidth = Math.random() * (baseSize * 0.2) + 1;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(splashX, splashY);
                    ctx.stroke();
                }
            }

            // Reset composite operation to avoid affecting normal drawing
            ctx.globalCompositeOperation = 'source-over';
        }

        // Event Listeners for drawing
        const startDrawing = (e) => {
            if (!isBrushActive || !currentImage) return;
            isDrawing = true;
            const pos = getCoordinates(e);
            drawSplatter(pos.x, pos.y);
        };

        const draw = (e) => {
            if (!isDrawing || !isBrushActive) return;
            // Throttle drawing slightly for performance and better splatter spacing
            if (Math.random() > 0.3) { 
                const pos = getCoordinates(e);
                drawSplatter(pos.x, pos.y);
            }
        };

        const stopDrawing = () => {
            isDrawing = false;
        };

        // Touch support for Mobile
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);

        // Mouse support for testing
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        // Auto Blast Button Logic
        document.getElementById('autoBlastBtn').addEventListener('click', () => {
            if (!currentImage) {
                alert("Please upload an image first!");
                return;
            }
            
            // Fire random blasts around the center of the image
            const blastPoints = 30;
            for(let i = 0; i < blastPoints; i++) {
                const randomX = (Math.random() * canvas.width * 0.8) + (canvas.width * 0.1);
                const randomY = (Math.random() * canvas.height * 0.8) + (canvas.height * 0.1);
                drawSplatter(randomX, randomY);
            }
        });

        // Save Image Button Logic
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (!currentImage) {
                alert("Please upload an image first!");
                return;
            }
            // Generate Data URL and trigger download
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'color_blast_effect_' + Date.now() + '.png';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Toggle Brush Active State
        document.getElementById('brushBtn').addEventListener('click', function() {
            isBrushActive = !isBrushActive;
            this.classList.toggle('active');
        });
    </script>
</body>
</html>
