<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0c15">
  <title>Colorful Powder Explosion · Photoshop Action</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0f0f1f, #03050b);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      padding: 16px 14px 28px 14px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* glassmorphic container */
    .tool-card {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      background: rgba(8, 12, 22, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 52px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .header {
      padding: 22px 24px 8px 24px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(125deg, #FFD966, #FF6AC4, #7C4DFF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1::before {
      content: "💥";
      font-size: 2rem;
      background: none;
      -webkit-background-clip: unset;
      color: #ffb347;
    }

    .badge {
      font-size: 0.7rem;
      color: #9ba0cc;
      margin-top: 6px;
      font-weight: 500;
      letter-spacing: 0.3px;
      display: flex;
      gap: 14px;
    }

    /* canvas zone */
    .canvas-area {
      padding: 16px 20px 8px 20px;
    }

    .preview-box {
      background: #010103;
      border-radius: 36px;
      padding: 8px;
      box-shadow: 0 15px 30px -8px black;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 28px;
      cursor: pointer;
      background: #0a0c14;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 6px 12px rgba(0,0,0,0.4);
    }

    /* controls */
    .controls {
      padding: 8px 20px 28px 20px;
    }

    .slider-group {
      margin-bottom: 24px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 600;
      color: #e2e6ff;
      margin-bottom: 8px;
    }

    .slider-header span:first-child {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .value-badge {
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 12px;
      border-radius: 40px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #ffd966;
    }

    input[type="range"] {
      width: 100%;
      height: 5px;
      -webkit-appearance: none;
      background: linear-gradient(90deg, #ff6a88, #ffb347, #7c4dff);
      border-radius: 8px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px #ffbd7f;
      border: 2px solid #ffc107;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 28px 0 16px;
      justify-content: center;
    }

    .btn {
      flex: 1;
      min-width: 100px;
      background: rgba(20, 25, 45, 0.8);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 12px 10px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      backdrop-filter: blur(4px);
      transition: 0.2s;
      cursor: pointer;
      color: #f0f2ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(105deg, #c23b77, #882bae);
      border-color: #ff90c0;
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
    }

    .btn-primary:active {
      transform: scale(0.96);
    }

    .btn-outline {
      background: rgba(0, 0, 0, 0.45);
    }

    .btn-save {
      background: linear-gradient(105deg, #1e4b3a, #0e2b22);
      border-color: #60b28c;
    }

    .file-label {
      background: rgba(30, 35, 55, 0.9);
      flex: 1.2;
    }

    input[type="file"] {
      display: none;
    }

    hr {
      margin: 16px 0 8px;
      border: none;
      height: 1px;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 80%);
    }

    .footer-tag {
      display: flex;
      justify-content: center;
      gap: 18px;
      font-size: 0.65rem;
      color: #6a70a0;
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="tool-card">
  <div class="header">
    <h1>COLORFUL POWDER <br> EXPLOSION</h1>
    <div class="badge">
      <span>🌈 PHOTOSHOP ACTION</span>
      <span>⚡ 4K BURST</span>
      <span>✨ FREE UPDATE</span>
    </div>
  </div>

  <div class="canvas-area">
    <div class="preview-box">
      <canvas id="explosionCanvas" width="800" height="600" style="width:100%; height:auto; max-width:100%;"></canvas>
    </div>
  </div>

  <div class="controls">
    <div class="slider-group">
      <div class="slider-header">
        <span>💥 EXPLOSION POWER (particle density)</span>
        <span class="value-badge" id="powerVal">72</span>
      </div>
      <input type="range" id="powerSlider" min="0" max="100" value="72" step="1">
    </div>

    <div class="slider-group">
      <div class="slider-header">
        <span>🎨 COLORFULNESS (vibrant range)</span>
        <span class="value-badge" id="colorVal">85</span>
      </div>
      <input type="range" id="colorSlider" min="0" max="100" value="85" step="1">
    </div>

    <div class="slider-group">
      <div class="slider-header">
        <span>💨 DUST SIZE (powder grain)</span>
        <span class="value-badge" id="sizeVal">2.0</span>
      </div>
      <input type="range" id="sizeSlider" min="0.8" max="4.5" value="2.0" step="0.05">
    </div>

    <div class="slider-group">
      <div class="slider-header">
        <span>🌀 BLAST RADIUS (spread)</span>
        <span class="value-badge" id="radiusVal">78</span>
      </div>
      <input type="range" id="radiusSlider" min="30" max="120" value="78" step="1">
    </div>

    <div class="button-row">
      <label class="btn file-label">
        📸 UPLOAD IMAGE
        <input type="file" id="imageUpload" accept="image/jpeg, image/png, image/webp">
      </label>
      <button class="btn btn-primary" id="explodeBtn">✨ EXPLODE NOW</button>
    </div>

    <div class="button-row">
      <button class="btn btn-outline" id="resetBtn">↺ RESET</button>
      <button class="btn btn-outline" id="demoBtn">🎨 DEMO MODEL</button>
      <button class="btn btn-save" id="saveBtn">💾 SAVE IMAGE</button>
    </div>
    <hr>
    <div class="footer-tag">
      <span>💢 colorful powder blast</span>
      <span>🎆 ultra reactive particles</span>
    </div>
  </div>
</div>

<script>
  (function(){
    // DOM elements
    const canvas = document.getElementById('explosionCanvas');
    const ctx = canvas.getContext('2d');
    
    // sliders
    const powerSlider = document.getElementById('powerSlider');
    const colorSlider = document.getElementById('colorSlider');
    const sizeSlider = document.getElementById('sizeSlider');
    const radiusSlider = document.getElementById('radiusSlider');
    const powerVal = document.getElementById('powerVal');
    const colorVal = document.getElementById('colorVal');
    const sizeVal = document.getElementById('sizeVal');
    const radiusVal = document.getElementById('radiusVal');
    
    // buttons
    const explodeBtn = document.getElementById('explodeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const demoBtn = document.getElementById('demoBtn');
    const saveBtn = document.getElementById('saveBtn');
    const fileInput = document.getElementById('imageUpload');
    
    // state
    let originalImage = null;        // HTMLImageElement
    let imageLoaded = false;
    
    // ========== UTILITIES ==========
    function updateSliderDisplays() {
      powerVal.innerText = powerSlider.value;
      colorVal.innerText = colorSlider.value;
      sizeVal.innerText = parseFloat(sizeSlider.value).toFixed(2);
      radiusVal.innerText = radiusSlider.value;
    }
    
    // draw original image on canvas (full size)
    function drawOriginalOnly() {
      if (!originalImage) return;
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
    }
    
    // reset explosion -> show clean original
    function resetToOriginal() {
      if (!originalImage) {
        generateDemoPortrait();
        return;
      }
      drawOriginalOnly();
    }
    
    // ========== COLORFUL POWDER EXPLOSION GENERATOR ==========
    // generates explosive particles (sparks, dust, glowing powder) with wild vibrant colors
    function renderPowderExplosion() {
      if (!originalImage) {
        generateDemoPortrait();
        setTimeout(() => renderPowderExplosion(), 30);
        return;
      }
      
      // 1. draw original base image
      drawOriginalOnly();
      
      // 2. read parameters
      let power = parseInt(powerSlider.value);        // 0-100
      let colorfulness = parseInt(colorSlider.value); // 0-100
      let dustSizeBase = parseFloat(sizeSlider.value);
      let blastRadiusPercent = parseInt(radiusSlider.value); // percentage of diagonal
      
      if (power === 0) return; // no effect
      
      const w = canvas.width;
      const h = canvas.height;
      const diagonal = Math.sqrt(w*w + h*h);
      const blastRadius = (blastRadiusPercent / 100) * diagonal * 0.8;
      
      // particle count based on power (300 to 3800 particles)
      let particleCount = Math.floor(380 + (power / 100) * 3400);
      if (power > 85) particleCount = Math.floor(particleCount * 1.2);
      
      // center of explosion (slightly organic, but mostly middle region / interesting composition)
      const centerX = w * (0.45 + Math.random() * 0.2);
      const centerY = h * (0.4 + Math.random() * 0.3);
      
      // vibrant powder color palette (neon / candy explosion)
      const vibrantPalette = [
        "#FF0A43", "#FFB800", "#FF5E9C", "#00E5FF", "#B700FF", "#39FF14", "#FF6F00", 
        "#FF00D4", "#FFB347", "#00FFAA", "#F700FF", "#FF3B6F", "#2AF5FF", "#FFD966", 
        "#DA00FF", "#FF8C42", "#4CFFB2", "#FF4B8C", "#FFA07A", "#AA00FF", "#55FF9E"
      ];
      
      // extra pastel + metallic for rich explosion
      const extraGlow = ["#FFD1E8", "#FFB86B", "#C084FC", "#A3E4FF", "#FDB0C0"];
      const allColors = [...vibrantPalette, ...extraGlow];
      
      // helper: get color based on colorfulness slider
      function getExplosionColor() {
        if (colorfulness > 85) {
          // extreme: random from all colors + high saturation mix
          return allColors[Math.floor(Math.random() * allColors.length)];
        } else if (colorfulness > 45) {
          // medium-high: bright but also some variation
          let idx = Math.floor(Math.random() * vibrantPalette.length);
          return vibrantPalette[idx];
        } else {
          // lower colorfulness: pastel / soft tint from base
          let pastel = ["#FFB3BA", "#B5EAD7", "#C7E9FB", "#FFDAC1", "#E2F0CB"];
          return pastel[Math.floor(Math.random() * pastel.length)];
        }
      }
      
      // SAVE context for blending layers
      ctx.save();
      // first pass: normal blending for solid dust particles
      ctx.globalCompositeOperation = 'source-over';
      
      // ---- 1) MAIN POWDER PARTICLES (round splashes) ----
      for (let i = 0; i < particleCount; i++) {
        // direction & distance from epicenter
        let angle = Math.random() * Math.PI * 2;
        let distance = Math.pow(Math.random(), 1.2) * blastRadius; // more particles near center for dense burst
        let x = centerX + Math.cos(angle) * distance * (Math.random() * 1.3);
        let y = centerY + Math.sin(angle) * distance * (Math.random() * 1.3);
        // clamp edges
        x = Math.min(w + 20, Math.max(-20, x));
        y = Math.min(h + 20, Math.max(-20, y));
        
        // size variation based on dustSize slider + randomness
        let size = dustSizeBase * (Math.random() * 3.2 + 0.8);
        if (power > 75) size *= 1.2;
        
        let color = getExplosionColor();
        // opacity: more intense near center and with power
        let opacity = 0.55 + (Math.random() * 0.45);
        if (distance < blastRadius * 0.4) opacity += 0.2;
        opacity = Math.min(0.95, opacity * (0.6 + power/150));
        
        ctx.beginPath();
        ctx.arc(x, y, size * 0.9, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.globalAlpha = opacity;
        ctx.fill();
        
        // extra tiny glitter fragments (even smaller sparkling)
        if (Math.random() > 0.65 && power > 40) {
          ctx.beginPath();
          ctx.arc(x + (Math.random() - 0.5)*size, y + (Math.random() - 0.5)*size, size * 0.45, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255, 215, 100, ${opacity * 0.9})`;
          ctx.fill();
        }
      }
      
      // ---- 2) GLOWING DUST CLOUDS & COLORFUL SMOKE (lighter blend for electric look) ----
      ctx.globalCompositeOperation = 'lighter';
      let cloudCount = Math.floor(60 + (power / 100) * 150);
      for (let i = 0; i < cloudCount; i++) {
        let angle = Math.random() * Math.PI * 2;
        let distance = Math.pow(Math.random(), 1.0) * blastRadius * 0.9;
        let x = centerX + Math.cos(angle) * distance * (Math.random() * 1.5);
        let y = centerY + Math.sin(angle) * distance * (Math.random() * 1.5);
        x = Math.min(w + 30, Math.max(-30, x));
        y = Math.min(h + 30, Math.max(-30, y));
        
        let radiusBlob = (Math.random() * 22 + 8) * (dustSizeBase * 0.8);
        let glowColor = getExplosionColor();
        ctx.beginPath();
        ctx.ellipse(x, y, radiusBlob, radiusBlob * (Math.random() * 0.8 + 0.6), Math.random() * Math.PI, 0, Math.PI*2);
        let glowAlpha = 0.25 + Math.random() * 0.45;
        ctx.fillStyle = glowColor;
        ctx.globalAlpha = glowAlpha * (power/90);
        ctx.fill();
      }
      
      // ---- 3) SPARKLING DUST TRAILS & WISPS (powder arcs) ----
      ctx.globalCompositeOperation = 'source-over';
      let wispCount = Math.floor(30 + (power / 100) * 110);
      for (let i = 0; i < wispCount; i++) {
        let startAngle = Math.random() * Math.PI * 2;
        let startDist = Math.random() * blastRadius * 0.6;
        let startX = centerX + Math.cos(startAngle) * startDist;
        let startY = centerY + Math.sin(startAngle) * startDist;
        let endAngle = startAngle + (Math.random() - 0.5) * 1.2;
        let endDist = startDist + (Math.random() * blastRadius * 0.6);
        let endX = centerX + Math.cos(endAngle) * endDist;
        let endY = centerY + Math.sin(endAngle) * endDist;
        
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(
          centerX + (startX - centerX)*1.3 + (Math.random()-0.5)*40,
          centerY + (startY - centerY)*1.2 + (Math.random()-0.5)*40,
          endX, endY
        );
        let trailWidth = dustSizeBase * (Math.random() * 1.8 + 0.8);
        ctx.lineWidth = trailWidth;
        ctx.lineCap = 'round';
        let trailColor = getExplosionColor();
        ctx.strokeStyle = trailColor;
        ctx.globalAlpha = 0.5 + Math.random() * 0.35;
        ctx.stroke();
      }
      
      // ---- 4) "POP" CORES (bright intense center splashes) ----
      ctx.globalCompositeOperation = 'lighter';
      let centerSplashes = Math.floor(25 + (power/100)*70);
      for (let i = 0; i < centerSplashes; i++) {
        let rad = Math.random() * blastRadius * 0.45;
        let ang = Math.random() * Math.PI * 2;
        let px = centerX + Math.cos(ang) * rad;
        let py = centerY + Math.sin(ang) * rad;
        let coreSize = dustSizeBase * (Math.random() * 4 + 1.5);
        ctx.beginPath();
        ctx.arc(px, py, coreSize, 0, Math.PI*2);
        let hotColor = ["#FFE55C", "#FF8066", "#FF4DA6", "#FFB347", "#FF2E7A"][Math.floor(Math.random()*5)];
        ctx.fillStyle = hotColor;
        ctx.globalAlpha = 0.85;
        ctx.fill();
      }
      
      // ---- 5) MICRO POWDER FOG (tiny dots, insane density) ----
      if (power > 45) {
        let microCount = Math.floor(600 + (power/100) * 1800);
        for (let i = 0; i < microCount; i++) {
          let angle = Math.random() * 2 * Math.PI;
          let dist = Math.pow(Math.random(), 1.5) * blastRadius;
          let x = centerX + Math.cos(angle) * dist;
          let y = centerY + Math.sin(angle) * dist;
          if (x < -30 || x > w+30 || y < -30 || y > h+30) continue;
          ctx.beginPath();
          ctx.arc(x, y, dustSizeBase * 0.45, 0, Math.PI*2);
          let microColor = getExplosionColor();
          ctx.fillStyle = microColor;
          ctx.globalAlpha = 0.3 + Math.random() * 0.5;
          ctx.fill();
        }
      }
      
      ctx.restore();
      
      // final tiny extra: sparkling dust overlay (screen blend)
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      let sparkleCount = Math.floor(180 + (power/100)*400);
      for (let i=0; i<sparkleCount; i++) {
        let x = Math.random() * w;
        let y = Math.random() * h;
        let rad = dustSizeBase * (Math.random() * 1.2 + 0.3);
        ctx.beginPath();
        ctx.arc(x, y, rad, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 200, 120, ${Math.random() * 0.6})`;
        ctx.fill();
      }
      ctx.restore();
    }
    
    // ========== IMAGE HANDLING ==========
    function loadImageFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          imageLoaded = true;
          canvas.width = img.width;
          canvas.height = img.height;
          drawOriginalOnly();
          // auto apply explosion after upload (so user sees colorful result)
          renderPowderExplosion();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    // high-quality demo: modern silhouette + abstract background for spectacular powder effect
    function generateDemoPortrait() {
      const demoW = 900;
      const demoH = 700;
      const bufferCanvas = document.createElement('canvas');
      bufferCanvas.width = demoW;
      bufferCanvas.height = demoH;
      const bCtx = bufferCanvas.getContext('2d');
      
      // vivid dark gradient background to highlight powder colors
      const grad = bCtx.createLinearGradient(0, 0, demoW, demoH);
      grad.addColorStop(0, '#1b122c');
      grad.addColorStop(0.5, '#1f2a3e');
      grad.addColorStop(1, '#0d091a');
      bCtx.fillStyle = grad;
      bCtx.fillRect(0, 0, demoW, demoH);
      
      // abstract dynamic shapes
      bCtx.globalCompositeOperation = 'lighter';
      for (let i=0; i<60; i++) {
        bCtx.beginPath();
        bCtx.arc(Math.random() * demoW, Math.random() * demoH, Math.random() * 40 + 5, 0, Math.PI*2);
        bCtx.fillStyle = `rgba(100, 80, 200, ${Math.random() * 0.2})`;
        bCtx.fill();
      }
      bCtx.globalCompositeOperation = 'source-over';
      
      // central figure (fashion model silhouette) for explosion drama
      bCtx.shadowBlur = 0;
      bCtx.fillStyle = "#020617cc";
      bCtx.beginPath();
      bCtx.ellipse(demoW*0.5, demoH*0.55, demoW*0.18, demoH*0.25, 0, 0, Math.PI*2);
      bCtx.fill();
      bCtx.beginPath();
      bCtx.ellipse(demoW*0.5, demoH*0.4, demoW*0.11, demoH*0.14, 0, 0, Math.PI*2);
      bCtx.fill();
      // rim light
      bCtx.beginPath();
      bCtx.ellipse(demoW*0.5-10, demoH*0.37, 7, 11, 0, 0, Math.PI*2);
      bCtx.fillStyle = "#ffe6b3";
      bCtx.fill();
      
      // additional style streak
      bCtx.fillStyle = "#2a234a";
      bCtx.fillRect(0, demoH-70, demoW, 70);
      
      const demoImg = new Image();
      demoImg.onload = () => {
        originalImage = demoImg;
        imageLoaded = true;
        canvas.width = demoImg.width;
        canvas.height = demoImg.height;
        drawOriginalOnly();
        renderPowderExplosion();
      };
      demoImg.src = bufferCanvas.toDataURL('image/png');
    }
    
    // save image (current canvas with explosion)
    function saveCanvasImage() {
      if (!originalImage) {
        alert("📸 Please upload an image or use demo model first.");
        return;
      }
      // ensure latest explosion rendered
      renderPowderExplosion();
      const link = document.createElement('a');
      const timeStamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
      link.download = `powder_explosion_${timeStamp}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    // ========== EVENT LISTENERS (real-time slider update) ==========
    function refreshExplosion() {
      updateSliderDisplays();
      renderPowderExplosion();
    }
    
    powerSlider.addEventListener('input', refreshExplosion);
    colorSlider.addEventListener('input', refreshExplosion);
    sizeSlider.addEventListener('input', refreshExplosion);
    radiusSlider.addEventListener('input', refreshExplosion);
    explodeBtn.addEventListener('click', () => {
      updateSliderDisplays();
      renderPowderExplosion();
    });
    resetBtn.addEventListener('click', () => {
      resetToOriginal();
    });
    demoBtn.addEventListener('click', () => {
      generateDemoPortrait();
    });
    saveBtn.addEventListener('click', saveCanvasImage);
    fileInput.addEventListener('change', (e) => {
      if(e.target.files && e.target.files[0]) loadImageFromFile(e.target.files[0]);
    });
    
    // initialize demo model
    generateDemoPortrait();
    updateSliderDisplays();
  })();
</script>
</body>
</html>
