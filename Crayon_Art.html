<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crayon Art Effect</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            background-color: #ffffff; /* Base white for sketch effect */
            display: none; /* Hidden until image is uploaded */
        }

        .empty-state {
            position: absolute;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }

        .toolbar {
            height: 90px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            padding: 0 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: #a1a1aa;
            font-size: 12px;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn .icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.92);
        }

        .btn.primary {
            color: #fff;
        }

        .btn.primary .icon {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            color: white;
        }

        .btn.accent .icon {
            background: linear-gradient(135deg, #f43f5e, #8b5cf6);
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4);
            color: white;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">Crayon Art Editor</div>

    <div class="canvas-container">
        <div class="empty-state" id="emptyState">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 10px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <br>Upload an image to start
        </div>
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="toolbar">
        <input type="file" id="fileInput" accept="image/*">
        
        <button class="btn primary" id="uploadBtn">
            <div class="icon">📸</div>
            <span>Upload</span>
        </button>

        <button class="btn accent" id="applyEffectBtn">
            <div class="icon">🎨</div>
            <span>Crayon Effect</span>
        </button>

        <button class="btn primary" id="saveBtn">
            <div class="icon">💾</div>
            <span>Save</span>
        </button>
    </div>

    <script>
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const emptyState = document.getElementById('emptyState');
        
        let originalImage = null;

        // 1. Upload Logic
        document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Set canvas resolution to image resolution
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // Draw original image initially
                    ctx.drawImage(img, 0, 0);
                    originalImage = img;
                    
                    canvas.style.display = 'block';
                    emptyState.style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 2. Crayon Effect Logic
        document.getElementById('applyEffectBtn').addEventListener('click', () => {
            if (!originalImage) {
                alert("Please upload an image first!");
                return;
            }

            const w = canvas.width;
            const h = canvas.height;

            // Step 1: Base White Background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            // Step 2: Draw Image as High Contrast Grayscale
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = 'grayscale(100%) contrast(140%) brightness(110%)';
            ctx.drawImage(originalImage, 0, 0, w, h);
            ctx.filter = 'none'; // reset filter

            // Step 3: Procedural Crayon Scribbles (Hatching)
            ctx.globalCompositeOperation = 'multiply';
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)'; // Charcoal gray color
            ctx.lineWidth = Math.max(w * 0.002, 1); // Scale stroke width based on image size

            // Generate thousands of short, random lines to simulate coloring
            const numScribbles = 3000;
            for(let i = 0; i < numScribbles; i++) {
                let x = Math.random() * w;
                let y = Math.random() * h;
                let length = (Math.random() * (w * 0.05)) + 10;
                // Favor diagonal angles for natural sketching feel
                let angle = (Math.random() > 0.5 ? 0.8 : -0.8) + (Math.random() - 0.5) * 0.5;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + Math.cos(angle) * length, y + Math.sin(angle) * length);
                ctx.stroke();
            }

            // Step 4: Edge Vignette (Fade edges to white)
            ctx.globalCompositeOperation = 'source-over';
            const edgeFade = ctx.createRadialGradient(w/2, h/2, Math.min(w,h) * 0.35, w/2, h/2, Math.min(w,h) * 0.65);
            edgeFade.addColorStop(0, 'rgba(255, 255, 255, 0)'); // Transparent center
            edgeFade.addColorStop(1, 'rgba(255, 255, 255, 1)'); // Solid white edges
            ctx.fillStyle = edgeFade;
            ctx.fillRect(0, 0, w, h);

            // Step 5: Vibrant Color Blend Overlay
            ctx.globalCompositeOperation = 'color'; // Applies hue/saturation while keeping sketch luminance
            
            // Create a multi-colored gradient matching the reference image
            const colorGlow = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h) * 0.7);
            colorGlow.addColorStop(0.0, 'rgba(255, 255, 0, 0.8)');   // Yellow Center
            colorGlow.addColorStop(0.3, 'rgba(0, 255, 255, 0.8)');   // Cyan
            colorGlow.addColorStop(0.6, 'rgba(255, 0, 255, 0.8)');   // Magenta
            colorGlow.addColorStop(1.0, 'rgba(255, 255, 255, 0)');   // Fade out
            
            ctx.fillStyle = colorGlow;
            ctx.fillRect(0, 0, w, h);

            // Step 6: Reset composite operation
            ctx.globalCompositeOperation = 'source-over';
        });

        // 3. Save Logic
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (!originalImage) {
                alert("Please upload an image first!");
                return;
            }
            // Generate full-resolution Data URL
            const dataURL = canvas.toDataURL('image/jpeg', 0.95);
            
            // Trigger download mechanism
            const link = document.createElement('a');
            link.download = 'crayon_art_' + Date.now() + '.jpg';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
