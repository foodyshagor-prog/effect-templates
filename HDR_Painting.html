<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unlimited HDR Painting Effect</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            margin-top: 10px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .upload-area {
            border: 2px dashed rgba(96, 165, 250, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .upload-area:active {
            background: rgba(96, 165, 250, 0.05);
            border-color: rgba(96, 165, 250, 0.6);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 14px;
            font-weight: 600;
        }

        .canvas-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            background: #000;
            position: relative;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .controls {
            display: none;
            margin-bottom: 10px;
        }

        .control-group {
            margin-bottom: 24px;
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 12px;
            color: var(--text-main);
            font-weight: 600;
        }

        /* Modern Real-time Range Slider (Seekbar) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        
        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.6);
            border: 2px solid #fff;
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.15);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: linear-gradient(to right, rgba(96, 165, 250, 0.5), rgba(255, 255, 255, 0.1));
            border-radius: 3px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 13px;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin-bottom: 8px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>HDR Painting</h1>
        <p>Pro Cartoonify & Oil Paint Effect</p>
    </div>

    <div class="glass-panel">
        
        <div class="upload-area" id="uploadArea">
            <input type="file" id="imageInput" accept="image/jpeg, image/png, image/webp">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Tap to Select Image</div>
            <p style="font-size: 11px; color: var(--text-muted); margin-top: 6px;">High-quality WebGL rendering</p>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="editorCanvas"></canvas>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <span>Applying...</span>
            </div>
        </div>

        <div class="controls" id="controls">
            <div class="control-group">
                <div class="control-label">
                    <span>HDR Intensity</span>
                    <span id="intensityValue">70%</span>
                </div>
                <input type="range" id="intensitySlider" min="10" max="100" value="70">
            </div>

            <button class="btn btn-primary" id="saveBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                Save Image
            </button>
        </div>

    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const uploadArea = document.getElementById('uploadArea');
        const canvasContainer = document.getElementById('canvasContainer');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const controls = document.getElementById('controls');
        const intensitySlider = document.getElementById('intensitySlider');
        const intensityValue = document.getElementById('intensityValue');
        const saveBtn = document.getElementById('saveBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let originalImage = new Image();
        let isImageLoaded = false;
        let renderTimeout; // Used to prevent WebView lag while sliding
        
        // Limits rendering size to prevent WebView memory crashes on massive photos
        const MAX_DIMENSION = 1600; 

        // Handle Image Upload
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage.onload = function() {
                    initCanvas();
                    isImageLoaded = true;
                    uploadArea.style.display = 'none';
                    canvasContainer.style.display = 'block';
                    controls.style.display = 'block';
                    
                    // Apply initial effect automatically
                    processHDRPainting(); 
                }
                originalImage.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Initialize and scale canvas
        function initCanvas() {
            let width = originalImage.width;
            let height = originalImage.height;

            if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
                const ratio = Math.min(MAX_DIMENSION / width, MAX_DIMENSION / height);
                width = Math.round(width * ratio);
                height = Math.round(height * ratio);
            }

            canvas.width = width;
            canvas.height = height;
        }

        // --- REAL-TIME SEEKBAR LOGIC ---
        intensitySlider.addEventListener('input', (e) => {
            intensityValue.textContent = e.target.value + '%';
            
            if (!isImageLoaded) return;

            // 1. Clear previous timeout if user is actively dragging
            clearTimeout(renderTimeout);
            
            // 2. Show a quick visual cue
            loadingOverlay.style.display = 'flex';

            // 3. Wait 150ms after the slider stops moving before calculating 
            // This prevents the WebView from freezing during the drag action
            renderTimeout = setTimeout(() => {
                processHDRPainting();
                loadingOverlay.style.display = 'none';
            }, 150);
        });

        // Effect Processing Engine
        function processHDRPainting() {
            const intensity = parseInt(intensitySlider.value);
            const w = canvas.width;
            const h = canvas.height;

            // Clear and draw fresh base layer
            ctx.clearRect(0, 0, w, h);
            
            // STEP 1: Deep Saturation & Contrast Boost
            const saturate = 100 + (intensity * 1.5);
            const contrast = 100 + (intensity * 0.8);
            ctx.filter = `saturate(${saturate}%) contrast(${contrast}%)`;
            ctx.drawImage(originalImage, 0, 0, w, h);

            // STEP 2: Custom Posterization (Color Band Reduction)
            let imageData = ctx.getImageData(0, 0, w, h);
            let data = imageData.data;
            
            let levels = Math.max(4, 15 - Math.floor(intensity / 10));
            let factor = 255 / (levels - 1);

            for (let i = 0; i < data.length; i += 4) {
                data[i] = Math.round((data[i] / 255) * (levels - 1)) * factor;    
                data[i+1] = Math.round((data[i+1] / 255) * (levels - 1)) * factor; 
                data[i+2] = Math.round((data[i+2] / 255) * (levels - 1)) * factor; 
            }
            ctx.putImageData(imageData, 0, 0);

            // STEP 3: Edge Glow & Smoothness Overlay
            ctx.globalCompositeOperation = 'overlay';
            const blurAmount = Math.max(1, intensity / 20);
            ctx.filter = `blur(${blurAmount}px) contrast(120%) saturate(120%)`;
            ctx.globalAlpha = 0.4 + (intensity / 200); 
            ctx.drawImage(originalImage, 0, 0, w, h);

            // STEP 4: Soft Edge Darkening 
            ctx.globalCompositeOperation = 'multiply';
            ctx.filter = `blur(1px) contrast(150%) grayscale(100%)`;
            ctx.globalAlpha = 0.15; 
            ctx.drawImage(originalImage, 0, 0, w, h);

            // Reset Context state
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = 'none';
        }

        // Handle Image Save
        saveBtn.addEventListener('click', () => {
            if (!isImageLoaded) return;
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            
            const link = document.createElement('a');
            link.download = `HDR_Paint_${new Date().getTime()}.jpg`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
