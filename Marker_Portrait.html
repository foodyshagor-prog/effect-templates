<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marker Portrait Editor</title>
    <style>
        :root {
            --primary: #00e5ff; /* Cyan accent matching previous styles */
            --bg-top: #1e1e2f;
            --bg-bottom: #0b0b12;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .canvas-container {
            width: 100%;
            height: 42vh;
            background: #ffffff; /* White background needed for marker aesthetic */
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: crosshair;
        }

        .placeholder-text {
            position: absolute;
            color: #888;
            font-size: 0.9rem;
            pointer-events: none;
            font-weight: 500;
        }
        
        .tip-text {
            position: absolute;
            top: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            pointer-events: none;
            display: none;
            letter-spacing: 0.5px;
        }

        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
        }

        .slider-group {
            background: var(--surface);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .slider-header span {
            color: var(--primary);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: auto;
            padding-bottom: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .btn-upload {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-save {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Marker Portrait</h1>
    </div>

    <div class="canvas-container">
        <span class="placeholder-text" id="placeholderText">No Image Selected</span>
        <div class="tip-text" id="tipText">Tap to set focal point</div>
        <canvas id="editorCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="slider-group">
            <div class="slider-header">
                <label>Scribble Density</label>
                <span id="densityVal">40k</span>
            </div>
            <input type="range" id="strokeDensity" min="10000" max="80000" value="40000" step="5000">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>Marker Chaos (Length)</label>
                <span id="lengthVal">30px</span>
            </div>
            <input type="range" id="strokeLength" min="10" max="80" value="30">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>Face Reveal (Mask)</label>
                <span id="maskVal">40%</span>
            </div>
            <input type="range" id="maskRadius" min="10" max="80" value="40">
        </div>

        <div class="btn-group">
            <label class="btn btn-upload">
                Load Image
                <input type="file" id="imageLoader" accept="image/*"/>
            </label>
            <button id="saveBtn" class="btn btn-save">Save Image</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const imageLoader = document.getElementById('imageLoader');
        
        // Sliders & UI
        const strokeDensity = document.getElementById('strokeDensity');
        const strokeLength = document.getElementById('strokeLength');
        const maskRadius = document.getElementById('maskRadius');
        const densityVal = document.getElementById('densityVal');
        const lengthVal = document.getElementById('lengthVal');
        const maskVal = document.getElementById('maskVal');
        const placeholderText = document.getElementById('placeholderText');
        const tipText = document.getElementById('tipText');
        const saveBtn = document.getElementById('saveBtn');

        let currentImage = null;
        let imgData = null; // Stored pixel data for performance
        let offCanvas = null;
        let offCtx = null;
        
        // Focal point (defaults to center)
        let focusX = 0.5;
        let focusY = 0.5;

        // Handle Image Upload
        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    placeholderText.style.display = 'none';
                    tipText.style.display = 'block';
                    
                    // Scale down to prevent mobile freezing during 80,000 loop iteration
                    const MAX_WIDTH = 1000;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;

                    // Reset focus to center
                    focusX = 0.5;
                    focusY = 0.5;
                    
                    // Setup offscreen canvas for fast pixel reading
                    offCanvas = document.createElement('canvas');
                    offCanvas.width = width;
                    offCanvas.height = height;
                    offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
                    offCtx.drawImage(currentImage, 0, 0, width, height);
                    imgData = offCtx.getImageData(0, 0, width, height).data;
                    
                    applyEffect();
                }
                img.src = event.target.result;
            }
            if(e.target.files && e.target.files[0]){
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // The Marker Generative Engine
        function applyEffect() {
            if (!currentImage || !imgData) return;

            const density = parseInt(strokeDensity.value);
            const length = parseInt(strokeLength.value);
            const focusSize = parseInt(maskRadius.value) / 100;

            // Update Labels
            densityVal.innerText = (density / 1000) + 'k';
            lengthVal.innerText = length + 'px';
            maskVal.innerText = maskRadius.value + '%';

            // 1. Clear & Fill White Paper Background
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Draw Faint Base Image (Guides the scribbles visually)
            ctx.globalAlpha = 0.15;
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
            
            // 3. Generate Marker Scribbles
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'multiply'; // Makes strokes blend like ink
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const w = canvas.width;
            const h = canvas.height;

            for (let i = 0; i < density; i++) {
                // Pick random pixel
                const x = Math.random() * w;
                const y = Math.random() * h;

                // Read pixel brightness from offscreen array
                const index = (Math.floor(y) * w + Math.floor(x)) * 4;
                const r = imgData[index];
                const g = imgData[index + 1];
                const b = imgData[index + 2];
                const a = imgData[index + 3];

                if (a < 10) continue; 

                const brightness = (r + g + b) / 3;
                
                // Magic formula: Darker pixels have a higher chance of receiving a scribble
                if (Math.random() * 255 > brightness - 20) {
                    
                    // Dynamic Angle: Sweeping marker strokes based on position + random chaos
                    const baseAngle = (x / w) * Math.PI + (y / h) * Math.PI;
                    const chaosAngle = Math.random() * Math.PI * 2;
                    const finalAngle = baseAngle * 0.3 + chaosAngle * 0.7;

                    // Dynamic Length: Darker areas get thicker, shorter, more aggressive strokes
                    const strokeLen = length * (0.5 + Math.random() * 1.5) * (brightness / 255 + 0.5);

                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(
                        x + Math.cos(finalAngle) * strokeLen, 
                        y + Math.sin(finalAngle) * strokeLen
                    );

                    // Use original image colors but slightly darkened and transparent for ink effect
                    ctx.strokeStyle = `rgba(${r * 0.8}, ${g * 0.8}, ${b * 0.8}, 0.5)`;
                    ctx.lineWidth = Math.random() * 2.5 + 0.5;
                    ctx.stroke();
                }
            }

            // 4. Draw Sharp Focal Mask over Face
            ctx.globalCompositeOperation = 'source-over';
            
            // Create isolated mask canvas
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = w;
            maskCanvas.height = h;
            const mCtx = maskCanvas.getContext('2d');

            // Draw clean image onto mask canvas
            mCtx.drawImage(currentImage, 0, 0, w, h);

            // Apply Radial Gradient Eraser
            mCtx.globalCompositeOperation = 'destination-in';
            const cx = w * focusX;
            const cy = h * focusY;
            const outerR = Math.min(w, h) * (focusSize * 2); // Edge of fade
            const innerR = Math.min(w, h) * (focusSize * 0.5); // Solid center

            const gradient = mCtx.createRadialGradient(cx, cy, innerR, cx, cy, outerR);
            gradient.addColorStop(0, 'rgba(0,0,0,1)'); // Keep face 100% visible
            gradient.addColorStop(1, 'rgba(0,0,0,0)'); // Erase edges to reveal scribbles

            mCtx.fillStyle = gradient;
            mCtx.fillRect(0, 0, w, h);

            // Stamp the sharp, masked face back onto the main canvas
            ctx.drawImage(maskCanvas, 0, 0);
        }

        // Debounce sliders to keep mobile UI smooth while calculating 50k lines
        let timeout;
        function queueEffect() {
            clearTimeout(timeout);
            timeout = setTimeout(applyEffect, 50);
        }

        strokeDensity.addEventListener('input', queueEffect);
        strokeLength.addEventListener('input', queueEffect);
        maskRadius.addEventListener('input', queueEffect);

        // Touch/Click to set focal point
        function updateFocus(e) {
            if (!currentImage) return;
            
            const rect = canvas.getBoundingClientRect();
            // Calculate actual rendered canvas dimensions inside the contain box
            const canvasAspect = canvas.width / canvas.height;
            const rectAspect = rect.width / rect.height;
            let renderedW, renderedH, offsetX = 0, offsetY = 0;
            
            if (canvasAspect > rectAspect) {
                renderedW = rect.width;
                renderedH = rect.width / canvasAspect;
                offsetY = (rect.height - renderedH) / 2;
            } else {
                renderedH = rect.height;
                renderedW = rect.height * canvasAspect;
                offsetX = (rect.width - renderedW) / 2;
            }
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Map click position to percentage (0.0 to 1.0)
            const x = (clientX - rect.left - offsetX) / renderedW;
            const y = (clientY - rect.top - offsetY) / renderedH;

            // Ensure click is inside actual image bounds
            if (x >= 0 && x <= 1 && y >= 0 && y <= 1) {
                focusX = x;
                focusY = y;
                queueEffect();
            }
        }

        canvas.addEventListener('mousedown', updateFocus);
        canvas.addEventListener('touchstart', updateFocus, {passive: true});

        // Handle File Saving
        saveBtn.addEventListener('click', function() {
            if (!currentImage) {
                alert("Please load an image first.");
                return;
            }
            const dataURL = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = 'marker-portrait.jpg';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
