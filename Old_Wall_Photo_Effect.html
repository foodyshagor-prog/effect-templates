<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Old Wall Photo Effect</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-top: #16222a;
            --bg-bottom: #3a6073;
            --surface: rgba(255, 255, 255, 0.08);
            --surface-active: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --text-dim: #b0c4de;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 4 / 5;
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255,255,255,0.1);
            margin-bottom: 20px;
            position: relative;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .controls {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--surface);
            padding: 12px 15px;
            border-radius: 10px;
        }

        .control-group label {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Modern Mobile Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(0, 210, 255, 0.5);
            border: 2px solid white;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: auto;
            padding-top: 15px;
        }

        button, .file-upload-label {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active, .file-upload-label:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.3);
        }

        .btn-secondary {
            background: var(--surface);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        input[type="file"] {
            display: none;
        }

        #placeholder-text {
            position: absolute;
            color: var(--text-dim);
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        #loading {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Old Wall FX</h1>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div id="placeholder-text">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <span>Tap Load Image</span>
        </div>
        <div id="loading">Generating...</div>
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Grunge & Dirt <span id="grungeVal">60%</span></label>
            <input type="range" id="grunge" min="0" max="100" value="60">
        </div>
        <div class="control-group">
            <label>Wall Cracks <span id="cracksVal">50%</span></label>
            <input type="range" id="cracks" min="0" max="100" value="50">
        </div>
        <div class="control-group">
            <label>Vintage Fade <span id="fadeVal">70%</span></label>
            <input type="range" id="fade" min="0" max="100" value="70">
        </div>

        <div class="button-group">
            <label class="file-upload-label btn-secondary">
                Load
                <input type="file" id="imageUpload" accept="image/*">
            </label>
            <button id="saveBtn" class="btn-primary">Save Image</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const imageUpload = document.getElementById('imageUpload');
        const saveBtn = document.getElementById('saveBtn');
        const placeholderText = document.getElementById('placeholder-text');
        const loadingIndicator = document.getElementById('loading');

        // Controls
        const grungeCtrl = document.getElementById('grunge');
        const cracksCtrl = document.getElementById('cracks');
        const fadeCtrl = document.getElementById('fade');

        // Value Labels
        const grungeVal = document.getElementById('grungeVal');
        const cracksVal = document.getElementById('cracksVal');
        const fadeVal = document.getElementById('fadeVal');

        let imgObj = null;
        let textureCanvas = document.createElement('canvas');
        let textureCtx = textureCanvas.getContext('2d');
        let maxCanvasSize = 1080; // Optimal for mobile WebView RAM limits
        let debounceTimer;

        // Generate Procedural Wall Texture
        function generateWallTexture(width, height, grungeLevel, crackLevel) {
            textureCanvas.width = width;
            textureCanvas.height = height;
            
            // Base concrete color
            textureCtx.fillStyle = '#e0dbd5';
            textureCtx.fillRect(0, 0, width, height);

            // Add Noise (Dirt/Grunge)
            if (grungeLevel > 0) {
                const imgData = textureCtx.getImageData(0, 0, width, height);
                const data = imgData.data;
                const noiseAmount = grungeLevel * 1.5;
                
                for (let i = 0; i < data.length; i += 4) {
                    // Create clumpy noise by using coordinates
                    let noise = (Math.random() - 0.5) * noiseAmount;
                    data[i]     = Math.max(0, Math.min(255, data[i] + noise));     // R
                    data[i + 1] = Math.max(0, Math.min(255, data[i+1] + noise)); // G
                    data[i + 2] = Math.max(0, Math.min(255, data[i+2] + noise)); // B
                }
                textureCtx.putImageData(imgData, 0, 0);
            }

            // Draw Procedural Cracks
            if (crackLevel > 0) {
                const numCracks = Math.floor((width * height) / 80000 * (crackLevel / 100));
                
                for(let i = 0; i < numCracks; i++) {
                    textureCtx.beginPath();
                    let x = Math.random() * width;
                    let y = Math.random() * height;
                    textureCtx.moveTo(x, y);
                    
                    let length = Math.random() * (width / 3) + 50;
                    let angle = Math.random() * Math.PI * 2;
                    
                    textureCtx.lineWidth = Math.random() * 2.5 + 0.5;
                    textureCtx.strokeStyle = `rgba(30, 25, 20, ${Math.random() * 0.6 + 0.2})`;
                    textureCtx.lineCap = 'round';
                    textureCtx.lineJoin = 'round';

                    for(let j = 0; j < length; j += 15) {
                        angle += (Math.random() - 0.5) * 1.2; // Wander
                        x += Math.cos(angle) * 15;
                        y += Math.sin(angle) * 15;
                        textureCtx.lineTo(x, y);
                        
                        // Branching
                        if (Math.random() > 0.85) {
                            textureCtx.save();
                            let bx = x, by = y, bangle = angle + (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 1.5);
                            textureCtx.moveTo(bx, by);
                            let branchLen = Math.random() * 50 + 20;
                            textureCtx.lineWidth = textureCtx.lineWidth * 0.7;
                            for(let k = 0; k < branchLen; k += 8) {
                                bangle += (Math.random() - 0.5) * 0.8;
                                bx += Math.cos(bangle) * 8;
                                by += Math.sin(bangle) * 8;
                                textureCtx.lineTo(bx, by);
                            }
                            textureCtx.stroke();
                            textureCtx.restore();
                            textureCtx.moveTo(x, y); // restore main path
                        }
                    }
                    textureCtx.stroke();
                }

                // Add some dark spots/mold
                const numSpots = Math.floor(crackLevel / 2);
                for(let s=0; s<numSpots; s++) {
                    textureCtx.fillStyle = `rgba(20, 15, 10, ${Math.random() * 0.15})`;
                    textureCtx.beginPath();
                    textureCtx.arc(Math.random() * width, Math.random() * height, Math.random() * 100 + 20, 0, Math.PI*2);
                    textureCtx.fill();
                }
            }
        }

        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            loadingIndicator.style.display = 'block';
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    imgObj = img;
                    placeholderText.style.display = 'none';
                    
                    let w = img.width;
                    let h = img.height;
                    if (w > maxCanvasSize || h > maxCanvasSize) {
                        const ratio = Math.min(maxCanvasSize / w, maxCanvasSize / h);
                        w = w * ratio;
                        h = h * ratio;
                    }
                    
                    canvas.width = w;
                    canvas.height = h;
                    
                    // Generate initial texture
                    generateWallTexture(w, h, grungeCtrl.value, cracksCtrl.value);
                    applyEffect();
                    loadingIndicator.style.display = 'none';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function applyEffect() {
            if (!imgObj) return;

            const fade = fadeCtrl.value / 100;
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);

            // 1. Draw Base Image with Vintage/Faded Color Grading
            ctx.globalCompositeOperation = 'source-over';
            const contrast = 100 + (fade * 40); // Increase contrast
            const saturate = 100 - (fade * 50); // Desaturate for old look
            const sepia = fade * 40; // Add warmth
            const brightness = 100 - (fade * 15); // Darken slightly
            
            ctx.filter = `contrast(${contrast}%) saturate(${saturate}%) sepia(${sepia}%) brightness(${brightness}%)`;
            ctx.drawImage(imgObj, 0, 0, w, h);
            ctx.filter = 'none';

            // 2. Blend the Wall Texture
            // Multiply darkens the image based on the texture (great for cracks and dirt)
            ctx.globalCompositeOperation = 'multiply';
            ctx.globalAlpha = 0.8; 
            ctx.drawImage(textureCanvas, 0, 0, w, h);

            // 3. Overlay for harsh contrast and concrete highlighting
            ctx.globalCompositeOperation = 'overlay';
            ctx.globalAlpha = 0.4 + (fadeCtrl.value / 100 * 0.3);
            ctx.drawImage(textureCanvas, 0, 0, w, h);

            // 4. Edge Vignette (adds to the old photo feel)
            ctx.globalCompositeOperation = 'multiply';
            ctx.globalAlpha = fade * 0.8;
            let gradient = ctx.createRadialGradient(w/2, h/2, Math.min(w,h)/3, w/2, h/2, Math.max(w,h)/1.2);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);

            // Reset
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';
        }

        // Handle Slider Updates
        function onSliderChange() {
            if (!imgObj) return;
            
            grungeVal.innerText = grungeCtrl.value + '%';
            cracksVal.innerText = cracksCtrl.value + '%';
            fadeVal.innerText = fadeCtrl.value + '%';

            // Debounce texture generation since it's computationally heavy
            clearTimeout(debounceTimer);
            loadingIndicator.style.display = 'block';
            
            debounceTimer = setTimeout(() => {
                // Only regenerate texture if grunge or cracks changed
                generateWallTexture(canvas.width, canvas.height, grungeCtrl.value, cracksCtrl.value);
                requestAnimationFrame(() => {
                    applyEffect();
                    loadingIndicator.style.display = 'none';
                });
            }, 250);
        }

        grungeCtrl.addEventListener('input', onSliderChange);
        cracksCtrl.addEventListener('input', onSliderChange);
        fadeCtrl.addEventListener('input', () => {
            // Fade only needs compositing recalculation, no texture regen needed
            fadeVal.innerText = fadeCtrl.value + '%';
            if(imgObj) requestAnimationFrame(applyEffect);
        });

        // Save Functionality
        saveBtn.addEventListener('click', () => {
            if (!imgObj) {
                alert("Please load an image first.");
                return;
            }
            const dataURL = canvas.toDataURL('image/jpeg', 0.92);
            const link = document.createElement('a');
            link.download = 'old_wall_effect.jpg';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
