<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0c15">
  <title>Realistic Smoke Effect · Studio Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #131824, #090c14);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      padding: 18px 16px 32px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* modern glassmorphic container */
    .tool-container {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      background: rgba(12, 16, 24, 0.68);
      backdrop-filter: blur(18px);
      border-radius: 56px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* header area with smoke branding */
    .tool-header {
      padding: 22px 24px 12px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tool-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #FFFFFF 30%, #bcb9ff 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 3px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-header h1::before {
      content: "🌫️";
      font-size: 1.8rem;
      background: none;
      -webkit-background-clip: unset;
      color: #e0ddff;
    }

    .sub {
      font-size: 0.75rem;
      color: #8f94b0;
      margin-top: 6px;
      letter-spacing: 0.3px;
      font-weight: 500;
    }

    /* canvas area */
    .canvas-wrapper {
      padding: 20px 20px 12px 20px;
      display: flex;
      justify-content: center;
    }

    .canvas-card {
      background: #03050a;
      border-radius: 32px;
      padding: 8px;
      box-shadow: 0 20px 35px -12px black, inset 0 1px 0 rgba(255,255,255,0.05);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 24px;
      cursor: pointer;
      background: #0b0e16;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease;
    }

    canvas:active {
      transform: scale(0.99);
    }

    /* control panel */
    .controls-panel {
      padding: 8px 20px 28px 20px;
    }

    .slider-group {
      margin-bottom: 22px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 500;
      color: #d9deff;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
    }

    .slider-label span:first-child {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .value-display {
      background: rgba(0, 0, 0, 0.5);
      padding: 2px 10px;
      border-radius: 30px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #c0caff;
    }

    input[type="range"] {
      width: 100%;
      height: 5px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      outline: none;
    }

    input[type="range"]:focus {
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #ffffff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(255, 255, 255, 0.6);
      border: 2px solid #c4bbff;
      transition: 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(1.2);
      background: #eae5ff;
    }

    /* button row */
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 26px 0 16px 0;
      justify-content: center;
    }

    .btn {
      flex: 1;
      min-width: 100px;
      background: rgba(20, 26, 40, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 10px;
      border-radius: 44px;
      font-weight: 600;
      font-size: 0.9rem;
      backdrop-filter: blur(5px);
      transition: all 0.2s;
      cursor: pointer;
      color: #f0f2ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(105deg, #2e2b5e, #1a1f32);
      border-color: rgba(172, 163, 255, 0.5);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
      color: white;
    }

    .btn-primary:active {
      transform: scale(0.96);
      background: linear-gradient(105deg, #25224e, #12162a);
    }

    .btn-outline {
      background: rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-outline:active {
      background: rgba(255, 255, 255, 0.05);
      transform: scale(0.97);
    }

    .btn-save {
      background: linear-gradient(105deg, #1f3b2c, #10231c);
      border-color: #6bae8b;
    }

    .file-label {
      background: rgba(25, 30, 45, 0.9);
      text-align: center;
      flex: 1.2;
    }

    input[type="file"] {
      display: none;
    }

    .badge-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
      font-size: 0.7rem;
      color: #6f77a3;
    }

    hr {
      border: none;
      height: 1px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 80%);
      margin: 10px 0 8px;
    }

    @media (max-width: 480px) {
      .tool-container {
        border-radius: 44px;
      }
      .btn {
        padding: 10px 6px;
        font-size: 0.8rem;
      }
      .slider-label {
        font-size: 0.8rem;
      }
      .canvas-wrapper {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
<div class="tool-container">
  <div class="tool-header">
    <h1>REALISTIC SMOKE</h1>
    <div class="sub">PHOTOSHOP GRADE · ATMOSPHERIC EFFECT</div>
  </div>

  <div class="canvas-wrapper">
    <div class="canvas-card">
      <canvas id="smokeCanvas" width="700" height="500" style="width:100%; height:auto; max-width:100%;"></canvas>
    </div>
  </div>

  <div class="controls-panel">
    <div class="slider-group">
      <div class="slider-label">
        <span>💨 SMOKE DENSITY</span>
        <span class="value-display" id="densityValue">48</span>
      </div>
      <input type="range" id="densitySlider" min="0" max="100" value="48" step="1">
    </div>

    <div class="slider-group">
      <div class="slider-label">
        <span>🌫️ OPACITY / INTENSITY</span>
        <span class="value-display" id="opacityValue">0.55</span>
      </div>
      <input type="range" id="opacitySlider" min="0" max="100" value="55" step="1">
    </div>

    <div class="slider-group">
      <div class="slider-label">
        <span>🌀 SMOKE BLUR (SOFTNESS)</span>
        <span class="value-display" id="blurValue">12</span>
      </div>
      <input type="range" id="blurSlider" min="3" max="32" value="12" step="1">
    </div>

    <div class="slider-group">
      <div class="slider-label">
        <span>🔥 WISP SIZE & SCALE</span>
        <span class="value-display" id="scaleValue">1.0</span>
      </div>
      <input type="range" id="scaleSlider" min="0.5" max="2.2" value="1.0" step="0.02">
    </div>

    <div class="action-row">
      <label class="btn file-label">
        📷 UPLOAD IMAGE
        <input type="file" id="imageUploader" accept="image/jpeg, image/png, image/jpg, image/webp">
      </label>
      <button class="btn btn-primary" id="applySmokeBtn">✨ APPLY SMOKE</button>
    </div>

    <div class="action-row">
      <button class="btn btn-outline" id="resetBtn">↺ RESET</button>
      <button class="btn btn-outline" id="demoImageBtn">🎨 DEMO IMAGE</button>
      <button class="btn btn-save" id="saveBtn">💾 SAVE IMAGE</button>
    </div>
    <hr>
    <div class="badge-row">
      <span>⚡ realtime smoke preview</span>
      <span>🎭 dynamic wisp generator</span>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- DOM Elements ----------
    const canvas = document.getElementById('smokeCanvas');
    const ctx = canvas.getContext('2d');

    // Sliders
    const densitySlider = document.getElementById('densitySlider');
    const opacitySlider = document.getElementById('opacitySlider');
    const blurSlider = document.getElementById('blurSlider');
    const scaleSlider = document.getElementById('scaleSlider');
    const densityVal = document.getElementById('densityValue');
    const opacityVal = document.getElementById('opacityValue');
    const blurVal = document.getElementById('blurValue');
    const scaleVal = document.getElementById('scaleValue');

    // Buttons
    const applyBtn = document.getElementById('applySmokeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const saveBtn = document.getElementById('saveBtn');
    const demoBtn = document.getElementById('demoImageBtn');
    const fileInput = document.getElementById('imageUploader');

    // State
    let originalImage = null;        // HTMLImageElement
    let currentImageLoaded = false;
    let canvasWidth = 800, canvasHeight = 600;

    // helper: update slider numeric displays
    function updateSlidersDisplay() {
      densityVal.innerText = densitySlider.value;
      let opacityRaw = parseFloat(opacitySlider.value) / 100;
      opacityVal.innerText = opacityRaw.toFixed(2);
      blurVal.innerText = blurSlider.value;
      let scaleRaw = parseFloat(scaleSlider.value);
      scaleVal.innerText = scaleRaw.toFixed(2);
    }

    // draw original image onto canvas (preserve aspect)
    function drawOriginalImageToCanvas() {
      if (!originalImage) return;
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;
      canvasWidth = originalImage.width;
      canvasHeight = originalImage.height;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
    }

    // RESET : remove smoke, only original
    function resetToOriginal() {
      if (!originalImage) {
        if(!currentImageLoaded) {
          generateDefaultDemoImage();
        } else {
          drawOriginalImageToCanvas();
        }
        return;
      }
      drawOriginalImageToCanvas();
    }

    // ------------------- REALISTIC SMOKE GENERATOR (optimized for realtime) ------------------
    function drawSmokeEffect() {
      if (!originalImage) return;

      // 1. redraw original image as base
      drawOriginalImageToCanvas();

      let density = parseInt(densitySlider.value);
      let globalOpacityRaw = parseFloat(opacitySlider.value) / 100;
      let blurPx = parseInt(blurSlider.value);
      let sizeScale = parseFloat(scaleSlider.value);

      if (density === 0) return; // no smoke

      let particleCount = Math.floor(8 + (density / 100) * 68);
      let wispCount = Math.floor(4 + (density / 100) * 42);

      ctx.save();
      ctx.filter = `blur(${blurPx}px)`;
      
      const w = canvas.width;
      const h = canvas.height;
      const rand = (min, max) => min + Math.random() * (max - min);
      
      // ----- 1) SMOKE CLOUDS (soft ellipses) -----
      for (let i = 0; i < particleCount; i++) {
        let x = rand(-w*0.1, w*1.1);
        let y = rand(-h*0.1, h*1.1);
        let radiusBase = rand(25, 150) * sizeScale;
        let radiusX = radiusBase * rand(0.7, 1.3);
        let radiusY = radiusBase * rand(0.6, 1.4);
        
        let cloudAlpha = rand(0.12, 0.45) * globalOpacityRaw;
        let colorRand = Math.random();
        let r, g, b;
        if (colorRand < 0.7) {
          r = 255; g = 255; b = 255;
        } else if (colorRand < 0.85) {
          r = 245; g = 240; b = 255;
        } else {
          r = 255; g = 248; b = 235;
        }
        
        ctx.beginPath();
        ctx.ellipse(x, y, radiusX, radiusY, rand(0, Math.PI * 2), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${cloudAlpha})`;
        ctx.fill();
        
        if (density > 55 && i % 2 === 0) {
          ctx.beginPath();
          ctx.ellipse(x + rand(-25,25), y + rand(-20,20), radiusX*0.5, radiusY*0.5, rand(0, Math.PI), 0, Math.PI*2);
          ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${cloudAlpha * 0.7})`;
          ctx.fill();
        }
      }
      
      // ----- 2) WISPS / SMOKE TRAILS (curves) -----
      for (let i = 0; i < wispCount; i++) {
        let startX = rand(-w*0.1, w*0.8);
        let startY = rand(h*0.2, h*1.2);
        let ctrlX = startX + rand(-w*0.2, w*0.5);
        let ctrlY = startY + rand(-h*0.4, -h*0.1);
        let endX = ctrlX + rand(-w*0.2, w*0.4);
        let endY = ctrlY + rand(-h*0.5, -h*0.1);
        
        if (Math.random() > 0.65) {
          let tempX = endX; let tempY = endY;
          endX = startX; endY = startY;
          startX = tempX; startY = tempY;
          ctrlX = startX + rand(-w*0.2, w*0.4);
          ctrlY = startY + rand(-h*0.3, h*0.2);
        }
        
        let lineWidthBase = rand(12, 58) * sizeScale;
        let wispAlpha = rand(0.15, 0.55) * globalOpacityRaw;
        
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(ctrlX, ctrlY, endX, endY);
        ctx.lineWidth = lineWidthBase;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        let wR = 255, wG = 255, wB = 255;
        let wispColorRand = Math.random();
        if (wispColorRand > 0.85) {
          wR = 230; wG = 235; wB = 255;
        } else if (wispColorRand > 0.7) {
          wR = 250; wG = 245; wB = 255;
        }
        ctx.strokeStyle = `rgba(${wR}, ${wG}, ${wB}, ${wispAlpha})`;
        ctx.stroke();
        
        if (density > 35 && Math.random() > 0.6) {
          ctx.beginPath();
          ctx.moveTo(startX + rand(-8,8), startY + rand(-5,5));
          ctx.quadraticCurveTo(ctrlX + rand(-12,12), ctrlY + rand(-10,10), endX + rand(-8,8), endY + rand(-5,5));
          ctx.lineWidth = lineWidthBase * 0.5;
          ctx.strokeStyle = `rgba(255, 255, 240, ${wispAlpha * 0.65})`;
          ctx.stroke();
        }
      }
      
      // ----- 3) atmospheric haze overlay for depth -----
      if (density > 40) {
        let extraLayers = Math.floor(density / 25);
        for (let e = 0; e < extraLayers; e++) {
          let bigX = rand(w*0.2, w*0.8);
          let bigY = rand(h*0.3, h*0.7);
          let radBig = rand(80, 200) * sizeScale;
          ctx.beginPath();
          ctx.ellipse(bigX, bigY, radBig, radBig * rand(0.5, 1.2), 0, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255, 255, 255, ${rand(0.05, 0.2) * globalOpacityRaw})`;
          ctx.fill();
        }
      }
      
      ctx.restore();
    }
    
    // ---------- apply smoke (main render) ----------
    function applySmoke() {
      if (!originalImage) {
        generateDefaultDemoImage();
        setTimeout(() => {
          if (originalImage) drawSmokeEffect();
        }, 20);
        return;
      }
      drawSmokeEffect();
    }
    
    // ---------- load image from file ----------
    function loadImageFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          currentImageLoaded = true;
          canvas.width = img.width;
          canvas.height = img.height;
          canvasWidth = img.width;
          canvasHeight = img.height;
          drawOriginalImageToCanvas();
          drawSmokeEffect();  // immediate smoke after upload
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    // ---------- GENERATE DEMO IMAGE (artistic base with silhoutte) ----------
    function generateDefaultDemoImage() {
      const demoWidth = 900;
      const demoHeight = 700;
      const offCanvas = document.createElement('canvas');
      offCanvas.width = demoWidth;
      offCanvas.height = demoHeight;
      const offCtx = offCanvas.getContext('2d');
      
      const grad = offCtx.createLinearGradient(0, 0, demoWidth, demoHeight);
      grad.addColorStop(0, '#1f262f');
      grad.addColorStop(0.6, '#2a1e2c');
      grad.addColorStop(1, '#10131f');
      offCtx.fillStyle = grad;
      offCtx.fillRect(0, 0, demoWidth, demoHeight);
      
      offCtx.globalCompositeOperation = 'lighter';
      for (let i=0; i<40; i++) {
        offCtx.beginPath();
        offCtx.arc(Math.random() * demoWidth, Math.random() * demoHeight, Math.random() * 60 + 10, 0, Math.PI*2);
        offCtx.fillStyle = `rgba(180, 160, 220, ${Math.random() * 0.2})`;
        offCtx.fill();
      }
      offCtx.globalCompositeOperation = 'source-over';
      
      offCtx.fillStyle = "#0b0e16cc";
      offCtx.beginPath();
      offCtx.ellipse(demoWidth*0.5, demoHeight*0.55, demoWidth*0.2, demoHeight*0.25, 0, 0, Math.PI*2);
      offCtx.fill();
      offCtx.beginPath();
      offCtx.ellipse(demoWidth*0.5, demoHeight*0.4, demoWidth*0.12, demoHeight*0.14, 0, 0, Math.PI*2);
      offCtx.fill();
      
      offCtx.beginPath();
      offCtx.ellipse(demoWidth*0.5-12, demoHeight*0.37, 8, 12, 0, 0, Math.PI*2);
      offCtx.fillStyle = "#f5edc4";
      offCtx.fill();
      
      offCtx.fillStyle = "#262b3a";
      offCtx.beginPath();
      offCtx.rect(0, demoHeight-80, demoWidth, 80);
      offCtx.fill();
      
      const demoImageData = offCanvas.toDataURL('image/png');
      const demoImg = new Image();
      demoImg.onload = () => {
        originalImage = demoImg;
        currentImageLoaded = true;
        canvas.width = demoImg.width;
        canvas.height = demoImg.height;
        canvasWidth = demoImg.width;
        canvasHeight = demoImg.height;
        drawOriginalImageToCanvas();
        drawSmokeEffect();
      };
      demoImg.src = demoImageData;
    }
    
    // ---------- SAVE final image (with smoke) ----------
    function saveFinalImage() {
      if (!originalImage) {
        alert("📸 Please upload or generate an image first.");
        return;
      }
      drawSmokeEffect();  // ensure latest render
      const link = document.createElement('a');
      const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
      link.download = `smoke_effect_${timestamp}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    // ---------- REAL-TIME SLIDER UPDATE: immediate smoke refresh ----------
    function handleSliderRealtime() {
      updateSlidersDisplay();
      applySmoke();   // instantly redraw smoke effect
    }
    
    // attach event listeners for realtime preview on 'input'
    densitySlider.addEventListener('input', handleSliderRealtime);
    opacitySlider.addEventListener('input', handleSliderRealtime);
    blurSlider.addEventListener('input', handleSliderRealtime);
    scaleSlider.addEventListener('input', handleSliderRealtime);
    
    // button actions
    applyBtn.addEventListener('click', () => {
      updateSlidersDisplay();
      applySmoke();
    });
    resetBtn.addEventListener('click', () => {
      if(originalImage) resetToOriginal();
      else generateDefaultDemoImage();
    });
    saveBtn.addEventListener('click', saveFinalImage);
    demoBtn.addEventListener('click', () => {
      generateDefaultDemoImage();
    });
    fileInput.addEventListener('change', (e) => {
      if(e.target.files && e.target.files[0]) {
        loadImageFromFile(e.target.files[0]);
      }
    });
    
    // initial load: demo image with smoke
    generateDefaultDemoImage();
    updateSlidersDisplay();
  })();
</script>
</body>
</html>
