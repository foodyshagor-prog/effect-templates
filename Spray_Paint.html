<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spray Paint Stencil Art</title>
    <style>
        :root {
            --primary: #ff3e3e;
            --bg-dark: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh; /* FIX: Allows natural expansion */
            color: white;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto; /* FIX: Enables vertical scrolling */
            -webkit-overflow-scrolling: touch; /* FIX: Smooth kinetic momentum scrolling for iOS */
        }

        /* Header */
        .app-header {
            padding: 15px;
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Canvas Area */
        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            min-height: 320px; /* Prevents viewport collapse */
        }

        canvas {
            max-width: 100%;
            height: auto;
            max-height: 50vh; /* FIX: Keeps canvas bounded so control bar stays visible below it */
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #222;
            display: block;
        }

        /* Controls Area */
        .controls {
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(15px);
            padding: 25px 20px 40px 20px; /* Extra bottom padding for mobile gesture bars */
            border-radius: 30px 30px 0 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .control-row {
            margin-bottom: 18px;
        }

        .label-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* Color Circles */
        .color-selector {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            padding: 5px 0;
        }

        .color-dot {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            transition: 0.2s;
            cursor: pointer;
        }

        .color-dot.active {
            transform: scale(1.2);
            border-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-open { background: #333; color: white; border: 1px solid rgba(255,255,255,0.05); }
        .btn-save { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(255, 62, 62, 0.3); }
        button:active { transform: scale(0.96); }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="app-header">Spray Stencil Art</div>

    <div id="viewport">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="control-row">
            <div class="label-group">
                <span>Stencil Intensity</span>
                <span id="thresholdVal">120</span>
            </div>
            <input type="range" id="threshold" min="30" max="220" value="120">
        </div>

        <div class="control-row">
            <div class="label-group">
                <span>Spray Density (Grain)</span>
                <span id="grainVal">40%</span>
            </div>
            <input type="range" id="grain" min="0" max="100" value="40">
        </div>

        <div class="color-selector">
            <div class="color-dot active" style="background: #ff0000;" data-color="#ff0000"></div>
            <div class="color-dot" style="background: #e91e63;" data-color="#e91e63"></div>
            <div class="color-dot" style="background: #00bcd4;" data-color="#00bcd4"></div>
            <div class="color-dot" style="background: #4caf50;" data-color="#4caf50"></div>
            <div class="color-dot" style="background: #333333;" data-color="#333333"></div>
        </div>

        <div class="btn-group">
            <button class="btn-open" onclick="document.getElementById('fileInput').click()">Pick Photo</button>
            <button class="btn-save" onclick="saveImage()">Save Result</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*">

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let originalImg = null;
        let activeColor = "#ff0000";

        // Handle Image Upload
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (!e.target.files || !e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    originalImg = img;
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // UI Listeners
        document.getElementById('threshold').addEventListener('input', (e) => {
            document.getElementById('thresholdVal').innerText = e.target.value;
            processImage();
        });

        document.getElementById('grain').addEventListener('input', (e) => {
            document.getElementById('grainVal').innerText = e.target.value + "%";
            processImage();
        });

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', function() {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                this.classList.add('active');
                activeColor = this.dataset.color;
                processImage();
            });
        });

        function processImage() {
            if (!originalImg) return;

            // Setup dimensions
            const maxDim = 1080;
            let w = originalImg.width;
            let h = originalImg.height;
            
            if (w > maxDim || h > maxDim) {
                const ratio = Math.min(maxDim / w, maxDim / h);
                // FIX: Use Math.floor to force precise whole integer pixels to avoid WebView runtime bugs
                w = Math.floor(w * ratio); 
                h = Math.floor(h * ratio);
            } else {
                w = Math.floor(w);
                h = Math.floor(h);
            }
            
            canvas.width = w;
            canvas.height = h;

            // Draw Background Color layer
            ctx.fillStyle = activeColor;
            ctx.fillRect(0, 0, w, h);

            // Create temporary canvas for threshold processing
            const offscreen = document.createElement('canvas');
            offscreen.width = w;
            offscreen.height = h;
            const oCtx = offscreen.getContext('2d');
            oCtx.drawImage(originalImg, 0, 0, w, h);

            const imgData = oCtx.getImageData(0, 0, w, h);
            const data = imgData.data;
            
            const threshold = parseInt(document.getElementById('threshold').value);
            const grainAmount = parseInt(document.getElementById('grain').value);

            // Spray Stencil Logic
            for (let i = 0; i < data.length; i += 4) {
                // Grayscale + Random Jitter (Spray effect)
                const noise = (Math.random() - 0.5) * grainAmount;
                const gray = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114) + noise;

                // Thresholding with "Hard Edge" + "Soft Glow" logic
                if (gray < threshold * 0.7) {
                    // Deep Shadows (Black ink)
                    data[i] = 20; data[i+1] = 20; data[i+2] = 20; data[i+3] = 255;
                } else if (gray < threshold) {
                    // Midtones (Darker version of BG color or textured black)
                    data[i] = 0; data[i+1] = 0; data[i+2] = 0; data[i+3] = 180;
                } else if (gray > threshold + 40) {
                    // Highlights (White paint highlights)
                    data[i] = 255; data[i+1] = 255; data[i+2] = 255; data[i+3] = 200;
                } else {
                    // Transparent (Shows background color)
                    data[i+3] = 0;
                }
            }

            oCtx.putImageData(imgData, 0, 0);
            
            // Draw result over background
            ctx.drawImage(offscreen, 0, 0);

            // Add global subtle canvas noise for texture
            addOverlayGrain(ctx, w, h);
        }

        function addOverlayGrain(ctx, w, h) {
            ctx.save();
            ctx.globalAlpha = 0.05;
            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                ctx.fillStyle = "#000";
                ctx.fillRect(x, y, 1, 1);
            }
            ctx.restore();
        }

        function saveImage() {
            if (!originalImg) return;
            try {
                const dataUrl = canvas.toDataURL('image/png');
                
                // Native bridging option handling
                if (window.AndroidInterface && window.AndroidInterface.saveImage) {
                    window.AndroidInterface.saveImage(dataUrl);
                    return;
                }

                const link = document.createElement('a');
                link.download = 'spray_stencil_art.png';
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                console.error(e);
                alert("To save on this device, long-press directly on the canvas image asset.");
            }
        }

        // Init screen
        window.onload = () => {
            canvas.width = 400; canvas.height = 400;
            ctx.fillStyle = "#222";
            ctx.fillRect(0,0,400,400);
            ctx.fillStyle = "#666";
            ctx.font = "14px -apple-system, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("TAP 'PICK PHOTO' TO START", 200, 200);
        };
    </script>
</body>
</html>
