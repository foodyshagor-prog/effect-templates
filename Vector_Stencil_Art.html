<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector Stencil Art Tool</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f0f1b;
            --card: #1e1e2e;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f0f1b 0%, #1a1a2e 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Canvas Display */
        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            background-image: 
                linear-gradient(45deg, #161625 25%, transparent 25%), 
                linear-gradient(-45deg, #161625 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #161625 75%), 
                linear-gradient(-45deg, transparent 75%, #161625 75%);
            background-size: 20px 20px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            background-color: white;
            border-radius: 4px;
        }

        /* Controls Area */
        .controls-panel {
            background: var(--card);
            padding: 20px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
        }

        .control-group {
            margin-bottom: 18px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #bbb;
            font-weight: 500;
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .color-presets {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .color-dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        .color-dot.active {
            border-color: white;
            transform: scale(1.1);
        }

        .action-btns {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-load { background: #444; color: white; }
        .btn-save { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; }
        button:active { transform: scale(0.96); }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="header">Vector Stencil Art</div>

    <div id="viewport">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls-panel">
        <div class="control-group">
            <div class="label-row">
                <span>STENCIL THRESHOLD</span>
                <span id="thresholdVal">128</span>
            </div>
            <input type="range" id="threshold" min="20" max="230" value="128">
        </div>

        <div class="control-group">
            <div class="label-row">
                <span>BACKGROUND STYLE</span>
            </div>
            <div class="color-presets" id="colorContainer">
                <div class="color-dot active" style="background: #ffffff;" data-color="none"></div>
                <div class="color-dot" style="background: #ff3366;" data-color="#ff3366"></div>
                <div class="color-dot" style="background: #ccff00;" data-color="#ccff00"></div>
                <div class="color-dot" style="background: #00d2ff;" data-color="#00d2ff"></div>
                <div class="color-dot" style="background: #ff9900;" data-color="#ff9900"></div>
                <div class="color-dot" style="background: #9d00ff;" data-color="#9d00ff"></div>
            </div>
        </div>

        <div class="action-btns">
            <button class="btn-load" onclick="document.getElementById('fileInput').click()">
                OPEN PHOTO
            </button>
            <button class="btn-save" onclick="downloadImage()">
                SAVE IMAGE
            </button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*">

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const thresholdInput = document.getElementById('threshold');
        const colorDots = document.querySelectorAll('.color-dot');
        
        let originalImg = null;
        let selectedBgColor = 'none';

        // Initialize
        window.onload = () => {
            canvas.width = 800;
            canvas.height = 800;
            ctx.fillStyle = "white";
            ctx.fillRect(0,0,800,800);
            ctx.fillStyle = "#ccc";
            ctx.font = "20px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("Upload a photo to start", 400, 400);
        };

        // Handle Image Upload
        document.getElementById('fileInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    originalImg = img;
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Threshold Listener
        thresholdInput.oninput = function() {
            document.getElementById('thresholdVal').innerText = this.value;
            processImage();
        };

        // Color Selector Listener
        colorDots.forEach(dot => {
            dot.onclick = function() {
                colorDots.forEach(d => d.classList.remove('active'));
                this.classList.add('active');
                selectedBgColor = this.getAttribute('data-color');
                processImage();
            };
        });

        function processImage() {
            if (!originalImg) return;

            // 1. Setup Canvas Size
            const size = Math.min(originalImg.width, originalImg.height);
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;

            // 2. Draw Background
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (selectedBgColor !== 'none') {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const radius = Math.min(canvas.width, canvas.height) * 0.45;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fillStyle = selectedBgColor;
                ctx.fill();
            }

            // 3. Process Stencil Effect
            // We create an offscreen buffer for the black/white calculation
            const offCanvas = document.createElement('canvas');
            offCanvas.width = canvas.width;
            offCanvas.height = canvas.height;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(originalImg, 0, 0);

            const imgData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);
            const data = imgData.data;
            const threshold = parseInt(thresholdInput.value);

            for (let i = 0; i < data.length; i += 4) {
                // Grayscale calculation
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                
                if (avg < threshold) {
                    // Make it Black
                    data[i] = 0;
                    data[i+1] = 0;
                    data[i+2] = 0;
                    data[i+3] = 255;
                } else {
                    // Make it Transparent (so background color shows through)
                    data[i+3] = 0;
                }
            }
            
            // Put processed pixels back
            offCtx.putImageData(imgData, 0, 0);
            
            // Draw the stencil on top of our main canvas
            ctx.drawImage(offCanvas, 0, 0);
        }

        function downloadImage() {
            if (!originalImg) return;
            const link = document.createElement('a');
            link.download = 'stencil_art.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
