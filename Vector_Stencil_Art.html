<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector Stencil Art Tool</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f0f1b;
            --card: #1e1e2e;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f0f1b 0%, #1a1a2e 100%);
            color: var(--text);
            min-height: 100vh; /* FIX: Allows container to naturally expand vertically */
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto; /* FIX: Activates vertical scroll when content overflows */
            -webkit-overflow-scrolling: touch; /* FIX: Smooth kinetic momentum scrolling on iOS devices */
        }

        /* Header */
        .header {
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Canvas Display */
        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            min-height: 320px; /* Prevents visual layout collapsing */
            background-image: 
                linear-gradient(45deg, #161625 25%, transparent 25%), 
                linear-gradient(-45deg, #161625 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #161625 75%), 
                linear-gradient(-45deg, transparent 75%, #161625 75%);
            background-size: 20px 20px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            max-height: 50vh; /* FIX: Limits maximum visual size so adjustments remain reachable */
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            background-color: white;
            border-radius: 4px;
            display: block;
        }

        /* Controls Area */
        .controls-panel {
            background: var(--card);
            padding: 25px 20px 40px 20px; /* Extra bottom cushion for virtual home indicator swipes */
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
        }

        .control-group {
            margin-bottom: 18px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #bbb;
            font-weight: 500;
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 5px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
        }

        .color-presets {
            display: flex;
            gap: 12px;
            margin-top: 5px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .color-dot {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .color-dot.active {
            border-color: white;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .action-btns {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-load { background: #444; color: white; border: 1px solid rgba(255,255,255,0.05); }
        .btn-save { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; }
        button:active { transform: scale(0.96); }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="header">Vector Stencil Art</div>

    <div id="viewport">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls-panel">
        <div class="control-group">
            <div class="label-row">
                <span>STENCIL THRESHOLD</span>
                <span id="thresholdVal">128</span>
            </div>
            <input type="range" id="threshold" min="20" max="230" value="128">
        </div>

        <div class="control-group">
            <div class="label-row">
                <span>BACKGROUND STYLE</span>
            </div>
            <div class="color-presets" id="colorContainer">
                <div class="color-dot active" style="background: #ffffff;" data-color="none"></div>
                <div class="color-dot" style="background: #ff3366;" data-color="#ff3366"></div>
                <div class="color-dot" style="background: #ccff00;" data-color="#ccff00"></div>
                <div class="color-dot" style="background: #00d2ff;" data-color="#00d2ff"></div>
                <div class="color-dot" style="background: #ff9900;" data-color="#ff9900"></div>
                <div class="color-dot" style="background: #9d00ff;" data-color="#9d00ff"></div>
            </div>
        </div>

        <div class="action-btns">
            <button class="btn-load" onclick="document.getElementById('fileInput').click()">
                OPEN PHOTO
            </button>
            <button class="btn-save" onclick="downloadImage()">
                SAVE IMAGE
            </button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*">

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const thresholdInput = document.getElementById('threshold');
        const colorDots = document.querySelectorAll('.color-dot');
        
        let originalImg = null;
        let selectedBgColor = 'none';

        // Initialize
        window.onload = () => {
            canvas.width = 400;
            canvas.height = 400;
            ctx.fillStyle = "white";
            ctx.fillRect(0,0,400,400);
            ctx.fillStyle = "#aaa";
            ctx.font = "14px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("TAP 'OPEN PHOTO' TO START", 200, 200);
        };

        // Handle Image Upload
        document.getElementById('fileInput').onchange = function(e) {
            if (!e.target.files || !e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    originalImg = img;
                    processImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Threshold Listener
        thresholdInput.oninput = function() {
            document.getElementById('thresholdVal').innerText = this.value;
            processImage();
        };

        // Color Selector Listener
        colorDots.forEach(dot => {
            dot.onclick = function() {
                colorDots.forEach(d => d.classList.remove('active'));
                this.classList.add('active');
                selectedBgColor = this.getAttribute('data-color');
                processImage();
            };
        });

        function processImage() {
            if (!originalImg) return;

            // 1. Setup Canvas Size with Safe Performance Downscaling for Mobile Engines
            const maxDim = 1200;
            let w = originalImg.width;
            let h = originalImg.height;
            
            if (w > maxDim || h > maxDim) {
                const ratio = Math.min(maxDim / w, maxDim / h);
                w = Math.floor(w * ratio);
                h = Math.floor(h * ratio);
            } else {
                w = Math.floor(w);
                h = Math.floor(h);
            }

            canvas.width = w;
            canvas.height = h;

            // 2. Draw Background Layer
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, w, h);

            if (selectedBgColor !== 'none') {
                const centerX = w / 2;
                const centerY = h / 2;
                const radius = Math.min(w, h) * 0.45;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fillStyle = selectedBgColor;
                ctx.fill();
            }

            // 3. Process Stencil Effect
            const offCanvas = document.createElement('canvas');
            offCanvas.width = w;
            offCanvas.height = h;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(originalImg, 0, 0, w, h);

            const imgData = offCtx.getImageData(0, 0, w, h);
            const data = imgData.data;
            const threshold = parseInt(thresholdInput.value);

            for (let i = 0; i < data.length; i += 4) {
                // Grayscale luminance calculation
                const avg = (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114);
                
                if (avg < threshold) {
                    // Make it Pure Solid Black
                    data[i] = 0;
                    data[i+1] = 0;
                    data[i+2] = 0;
                    data[i+3] = 255;
                } else {
                    // Make it Fully Transparent (reveals background circle/white layers)
                    data[i+3] = 0;
                }
            }
            
            // Put processed stencil pixels back onto offscreen buffer
            offCtx.putImageData(imgData, 0, 0);
            
            // Render stencil structure securely directly on top of the main display context
            ctx.drawImage(offCanvas, 0, 0);
        }

        function downloadImage() {
            if (!originalImg) return;
            try {
                const dataUrl = canvas.toDataURL('image/png');
                
                // Hybrid application bridge handling wrapper
                if (window.AndroidInterface && window.AndroidInterface.saveImage) {
                    window.AndroidInterface.saveImage(dataUrl);
                    return;
                }

                const link = document.createElement('a');
                link.download = 'stencil_art.png';
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                console.error("Save system fallback triggered:", e);
                alert("To download on this interface, perform a long-press step directly on the preview art image canvas block to manually extract it.");
            }
        }
    </script>
</body>
</html>
