<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shagor Photo Editor - Vibrant Prism</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Modern Mobile App Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #09090e; 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        /* App Header */
        .app-header {
            padding: 20px;
            text-align: center;
            background: rgba(9, 9, 14, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .app-header h2 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(45deg, #ff00aa, #00d2ff, #ffea00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Canvas Preview Area */
        .preview-area {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 15px; overflow: hidden;
        }
        .canvas-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #12121a; border-radius: 20px; border: 1px dashed #333;
        }
        canvas { 
            max-width: 100%; max-height: 100%; 
            border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            object-fit: contain; display: none; 
        }
        .placeholder-text { color: #666; font-size: 14px; position: absolute; pointer-events: none; }

        /* Bottom Controls Sheet */
        .bottom-sheet {
            background: #161620; padding: 25px 20px;
            border-radius: 30px 30px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; gap: 20px;
        }

        input[type="file"] { display: none; }

        /* Slider Styling */
        .slider-group { display: flex; flex-direction: column; gap: 10px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; color: #bbb; font-weight: 500; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%;
            background: #ff00aa; cursor: pointer; margin-top: -9px;
            box-shadow: 0 0 12px rgba(255, 0, 170, 0.6);
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #333; border-radius: 2px; }

        /* Action Buttons Grid */
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { 
            padding: 14px; border-radius: 14px; border: none; font-size: 14px; font-weight: 600;
            font-family: 'Poppins', sans-serif; cursor: pointer; display: flex;
            justify-content: center; align-items: center; gap: 8px; transition: transform 0.1s ease;
        }
        .btn:active { transform: scale(0.96); }
        .btn-upload { background: #252532; color: #fff; }
        .btn-save { 
            background: linear-gradient(135deg, #ff00aa, #00d2ff); 
            color: white; 
            box-shadow: 0 4px 15px rgba(255, 0, 170, 0.3); 
        }
        .icon { width: 18px; height: 18px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="app-header">
        <h2>Shagor Photo Editor</h2>
    </div>

    <div class="preview-area">
        <div class="canvas-wrapper">
            <span class="placeholder-text" id="placeholder">Upload photo to see magic</span>
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <div class="bottom-sheet">
        
        <div class="slider-group">
            <div class="slider-header">
                <span>Prism Refraction Level</span>
                <span id="intensityVal">50</span>
            </div>
            <input type="range" id="intensity" min="0" max="100" value="50">
        </div>

        <div class="action-buttons">
            <input type="file" id="imageLoader" accept="image/*">
            
            <button class="btn btn-upload" onclick="document.getElementById('imageLoader').click()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19,13a1,1,0,0,0-1,1v.38L16.52,12.9a2.79,2.79,0,0,0-3.93,0l-.7.7L9.41,11.12a2.85,2.85,0,0,0-3.93,0L4,12.6V7A1,1,0,0,1,5,6h7a1,1,0,0,0,0-2H5A3,3,0,0,0,2,7V19a3,3,0,0,0,3,3H17a3,3,0,0,0,3-3V14A1,1,0,0,0,19,13ZM5,20a1,1,0,0,1-1-1V15.43l2.9-2.9a.79.79,0,0,1,1.09,0l3.17,3.17,0,0L15.46,20Zm13-1a.89.89,0,0,1-.18.53L13.31,15l.7-.7a.77.77,0,0,1,1.1,0L18,17.21ZM21.71,3.29a1,1,0,0,0-1.42,0L18,5.59l-2.29-2.3a1,1,0,0,0-1.42,1.42L16.59,7l-2.3,2.29a1,1,0,0,0,0,1.42,1,1,0,0,0,1.42,0L18,8.41l2.29,2.3a1,1,0,0,0,1.42,0,1,1,0,0,0,0-1.42L19.41,7l2.3-2.29A1,1,0,0,0,21.71,3.29Z"/></svg>
                Upload
            </button>

            <button class="btn btn-save" onclick="saveImage()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M21,14a1,1,0,0,0-1,1v4a1,1,0,0,1-1,1H5a1,1,0,0,1-1-1V15a1,1,0,0,0-2,0v4a3,3,0,0,0,3,3H19a3,3,0,0,0,3-3V15A1,1,0,0,0,21,14Zm-9.71,1.71a1,1,0,0,0,.33.21.94.94,0,0,0,.76,0,1,1,0,0,0,.33-.21l4-4a1,1,0,0,0-1.42-1.42L13,12.59V3a1,1,0,0,0-2,0v9.59l-2.29-2.3a1,1,0,1,0-1.42,1.42Z"/></svg>
                Save
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const intensityInput = document.getElementById('intensity');
        const intensityVal = document.getElementById('intensityVal');
        
        let img = new Image();
        let isImageLoaded = false;

        intensityInput.addEventListener('input', (e) => {
            intensityVal.textContent = e.target.value;
            applyEffect();
        });

        document.getElementById('imageLoader').onchange = (e) => {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    canvas.style.display = 'block';
                    placeholder.style.display = 'none';
                    isImageLoaded = true;

                    applyEffect(); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function applyEffect() {
            if (!isImageLoaded) return;

            const w = canvas.width;
            const h = canvas.height;
            const intensity = intensityInput.value;
            
            // Calculate offsets based on intensity slider
            const offset = (intensity / 100) * (w * 0.15); 
            const scale = 1 + (intensity / 500);

            ctx.clearRect(0, 0, w, h);

            // 1. Draw Original Center Image
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
            ctx.filter = 'none';
            ctx.drawImage(img, 0, 0, w, h);

            if (intensity > 0) {
                // 2. Add Prism Ghosting Layers (Refraction)
                ctx.globalCompositeOperation = 'screen';
                
                // Ghost Left
                ctx.save();
                ctx.globalAlpha = 0.4 + (intensity / 300);
                ctx.filter = 'blur(6px)';
                ctx.translate(-offset, offset * 0.5);
                ctx.scale(scale, scale);
                ctx.drawImage(img, 0, 0, w, h);
                ctx.restore();

                // Ghost Right
                ctx.save();
                ctx.globalAlpha = 0.4 + (intensity / 300);
                ctx.filter = 'blur(8px)';
                ctx.translate(offset, -offset * 0.5);
                ctx.scale(scale * 1.05, scale * 1.05);
                ctx.drawImage(img, 0, 0, w, h);
                ctx.restore();

                // 3. Vibrant Prismatic Light Leaks
                ctx.globalCompositeOperation = 'color-dodge'; 
                ctx.globalAlpha = 0.3 + (intensity / 200);

                // Colorful Rainbow Gradient
                let grad = ctx.createLinearGradient(0, 0, w, h);
                grad.addColorStop(0, '#00f6ff'); // Cyan
                grad.addColorStop(0.3, '#ff00aa'); // Magenta
                grad.addColorStop(0.7, '#ffea00'); // Yellow
                grad.addColorStop(1, '#0044ff'); // Blue
                
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);

                // 4. Lens Flare / Light Spots
                ctx.globalCompositeOperation = 'screen';
                ctx.filter = 'blur(40px)';
                ctx.globalAlpha = 0.6 + (intensity / 250);
                
                // Spot 1
                ctx.fillStyle = '#ff00aa';
                ctx.beginPath();
                ctx.arc(w * 0.2, h * 0.8, w * 0.2, 0, Math.PI * 2);
                ctx.fill();

                // Spot 2
                ctx.fillStyle = '#00f6ff';
                ctx.beginPath();
                ctx.arc(w * 0.8, h * 0.2, w * 0.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function saveImage() {
            if (!isImageLoaded) return;
            const dataURL = canvas.toDataURL("image/jpeg", 1.0);
            const link = document.createElement("a");
            link.download = "Shagor_Vibrant_Prism.jpg";
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
