<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watercolor Halftone Editor</title>
    <style>
        :root {
            --primary: #ff4081; /* Changed to a vibrant pink/magenta to match watercolor vibe */
            --bg-top: #2a2a3e;
            --bg-bottom: #12121a;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .canvas-container {
            width: 100%;
            height: 40vh;
            background: var(--surface);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            background-color: #fff; /* White background for watercolor canvas feel */
        }

        .placeholder-text {
            position: absolute;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        .slider-group {
            background: var(--surface);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .slider-header span {
            color: var(--primary);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(255, 64, 129, 0.5);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            padding-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-upload {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-save {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Watercolor Halftone</h1>
    </div>

    <div class="canvas-container">
        <span class="placeholder-text" id="placeholderText">No Image Selected</span>
        <canvas id="editorCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="slider-group">
            <div class="slider-header">
                <label>Watercolor Bleed</label>
                <span id="bleedVal">30px</span>
            </div>
            <input type="range" id="bleedAmount" min="0" max="80" value="30">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>Halftone Dot Size</label>
                <span id="dotSizeVal">4px</span>
            </div>
            <input type="range" id="dotSize" min="1" max="10" value="4" step="0.5">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label>Halftone Density</label>
                <span id="densityVal">60%</span>
            </div>
            <input type="range" id="dotDensity" min="10" max="100" value="60">
        </div>

        <div class="btn-group">
            <label class="btn btn-upload">
                Load Image
                <input type="file" id="imageLoader" accept="image/*"/>
            </label>
            <button id="saveBtn" class="btn btn-save">Save Image</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const imageLoader = document.getElementById('imageLoader');
        
        // Sliders and Labels
        const bleedAmount = document.getElementById('bleedAmount');
        const dotSize = document.getElementById('dotSize');
        const dotDensity = document.getElementById('dotDensity');
        
        const bleedVal = document.getElementById('bleedVal');
        const dotSizeVal = document.getElementById('dotSizeVal');
        const densityVal = document.getElementById('densityVal');
        
        const saveBtn = document.getElementById('saveBtn');
        const placeholderText = document.getElementById('placeholderText');

        let currentImage = null;

        // Handle Image Upload
        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    placeholderText.style.display = 'none';
                    
                    // Scale down massively huge images to prevent mobile browser crashes during filter rendering
                    const MAX_WIDTH = 1200;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    applyEffect();
                }
                img.src = event.target.result;
            }
            if(e.target.files && e.target.files[0]){
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // Generate Radial Halftone Pattern
        function drawRadialHalftone(width, height, maxDotRadius, opacity) {
            ctx.save();
            ctx.globalCompositeOperation = 'overlay'; // Blends dots into the image colors
            ctx.globalAlpha = opacity;
            ctx.fillStyle = '#111111'; // Dark dots
            
            const cx = width / 2;
            const cy = height / 2;
            const maxR = Math.sqrt(cx*cx + cy*cy); // Distance to furthest corner
            
            // Adjust spoke count based on image width to keep density consistent
            const numSpokes = Math.floor(width / 15); 
            const spacing = 15; // Distance between dots on a spoke

            for (let i = 0; i < numSpokes; i++) {
                const angle = (i * Math.PI * 2) / numSpokes;
                
                // Start drawing slightly away from the exact center
                for (let r = 30; r < maxR; r += spacing) {
                    
                    // Add slight variance to dot size to make it feel more organic/analog
                    let currentDotSize = maxDotRadius * (1 - (r / maxR) * 0.3);
                    if (currentDotSize < 0.5) currentDotSize = 0.5;

                    const x = cx + r * Math.cos(angle);
                    const y = cy + r * Math.sin(angle);

                    ctx.beginPath();
                    ctx.arc(x, y, currentDotSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.restore();
        }

        // Core Rendering Engine
        function applyEffect() {
            if (!currentImage) return;

            const bleed = bleedAmount.value;
            const radius = parseFloat(dotSize.value);
            const density = dotDensity.value / 100;

            // Update UI Labels
            bleedVal.innerText = bleed + 'px';
            dotSizeVal.innerText = radius + 'px';
            densityVal.innerText = dotDensity.value + '%';

            // 1. Clear Canvas & Fill with White Background
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Draw Base Image (High Contrast/Slightly desaturated for paper feel)
            ctx.globalCompositeOperation = 'source-over';
            ctx.filter = 'contrast(1.3) saturate(0.8)';
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);

            // 3. Draw Watercolor Color Bleed Layer
            // Using 'overlay' or 'hard-light' to let the blurry, hyper-saturated colors bleed out
            ctx.globalCompositeOperation = 'overlay';
            ctx.filter = `blur(${bleed}px) saturate(3) contrast(1.5)`;
            ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);

            // Reset filters before drawing halftones
            ctx.filter = 'none';

            // 4. Generate & Draw the Radial Halftones
            drawRadialHalftone(canvas.width, canvas.height, radius, density);
        }

        // Live update when sliders move
        bleedAmount.addEventListener('input', applyEffect);
        dotSize.addEventListener('input', applyEffect);
        dotDensity.addEventListener('input', applyEffect);

        // Handle Image Save
        saveBtn.addEventListener('click', function() {
            if (!currentImage) {
                alert("Please load an image first.");
                return;
            }
            
            const dataURL = canvas.toDataURL('image/jpeg', 0.90);
            const link = document.createElement('a');
            link.download = 'watercolor-halftone.jpg';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
