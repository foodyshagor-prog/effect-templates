<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shagor Chalk Photo Effect with Save Option</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
            background: #252525;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        canvas {
            max-width: 100%;
            max-height: 50vh;
            display: block;
            border-radius: 8px;
        }

        .seekbar-container {
            margin: 15px 0 15px 0;
            text-align: left;
            background: #252525;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .seekbar-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .seekbar-label span {
            color: #2196F3;
            font-weight: bold;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #2196F3;
            cursor: pointer;
        }

        input[type="range"]:disabled::-webkit-slider-thumb {
            background: #555;
            cursor: not-allowed;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload, .save-btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .custom-file-upload {
            border: 1px solid #444;
            background: #333333;
            color: #fff;
        }

        /* 💾 সেভ বাটনের চমৎকার ব্লু গ্রেডিয়েন্ট স্টাইল */
        .save-btn {
            background: linear-gradient(45deg, #2196F3, #1565C0);
            color: white;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }

        .save-btn:disabled {
            background: #444 !important;
            color: #888 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .loader {
            visibility: hidden;
            color: #2196F3;
            font-size: 13px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Chalk Photo Effect</h2>
    
    <div class="canvas-container">
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="seekbar-container">
        <div class="seekbar-label">
            <label for="intensitySlider">Chalk Intensity</label>
            <span id="intensityVal">5</span>
        </div>
        <input type="range" id="intensitySlider" min="1" max="10" value="5" oninput="onSliderDrag(this.value)" disabled>
    </div>

    <div class="btn-wrapper">
        <label class="custom-file-upload">
            <input type="file" id="imageLoader" accept="image/*"/>
            Upload Image
        </label>
        
        <button id="saveBtn" class="save-btn" onclick="saveProcessedImage()" disabled>Save Image</button>
        
        <div id="loadingText" class="loader">Rendering...</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('photoCanvas');
    const ctx = canvas.getContext('2d');
    const imageLoader = document.getElementById('imageLoader');
    const intensitySlider = document.getElementById('intensitySlider');
    const saveBtn = document.getElementById('saveBtn');
    const loadingText = document.getElementById('loadingText');
    let originalImage = new Image();
    let sliderTimeout = null; 

    imageLoader.addEventListener('change', handleImage, false);

    function handleImage(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            originalImage.onload = function() {
                let targetWidth = originalImage.width;
                let targetHeight = originalImage.height;
                const maxDimension = 1080;

                if (targetWidth > maxDimension || targetHeight > maxDimension) {
                    if (targetWidth > targetHeight) {
                        targetHeight = Math.round((targetHeight * maxDimension) / targetWidth);
                        targetWidth = maxDimension;
                    } else {
                        targetWidth = Math.round((targetWidth * maxDimension) / targetHeight);
                    }
                }

                canvas.width = targetWidth;
                canvas.height = targetHeight;
                
                intensitySlider.disabled = false;
                saveBtn.disabled = false; // ছবি আপলোড হলে সেভ বাটন সচল হবে
                processChalkEffect();
            }
            originalImage.src = event.target.result;
        }
        if(e.target.files[0]) {
            reader.readAsDataURL(e.target.files[0]);
        }
    }

    function onSliderDrag(val) {
        document.getElementById('intensityVal').innerText = val;
        if (!originalImage.src) return;

        loadingText.style.visibility = 'visible';
        saveBtn.disabled = true; // প্রসেসিং চলার সময় সেভ বাটন সাময়িক ডিজেবল থাকবে

        clearTimeout(sliderTimeout);
        sliderTimeout = setTimeout(() => {
            processChalkEffect();
        }, 50); 
    }

    function processChalkEffect() {
        if (!originalImage.src) return;

        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

        const width = canvas.width;
        const height = canvas.height;
        const srcData = ctx.getImageData(0, 0, width, height);
        const dstData = ctx.createImageData(width, height);
        
        const s = srcData.data;
        const d = dstData.data;

        const sliderValue = parseInt(intensitySlider.value);
        
        const threshold = 110 - (sliderValue * 8); 
        const multiplier = sliderValue * 0.35;

        const kx = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
        const ky = [-1, -2, -1, 0, 0, 0, 1, 2, 1];

        for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
                let resX = 0;
                let resY = 0;

                for (let cy = -1; cy <= 1; cy++) {
                    for (let cx = -1; cx <= 1; cx++) {
                        const pixelIdx = ((y + cy) * width + (x + cx)) * 4;
                        const gray = 0.299 * s[pixelIdx] + 0.587 * s[pixelIdx + 1] + 0.114 * s[pixelIdx + 2];

                        const kernelIdx = (cy + 1) * 3 + (cx + 1);
                        resX += gray * kx[kernelIdx];
                        resY += gray * ky[kernelIdx];
                    }
                }

                let magnitude = Math.sqrt(resX * resX + resY * resY);
                magnitude = magnitude > threshold ? magnitude * multiplier : 0;
                if (magnitude > 255) magnitude = 255;

                const currentIdx = (y * width + x) * 4;
                const alpha = magnitude / 255;

                d[currentIdx]     = Math.floor(30 * (1 - alpha) + 245 * alpha);
                d[currentIdx + 1] = Math.floor(30 * (1 - alpha) + 245 * alpha);
                d[currentIdx + 2] = Math.floor(33 * (1 - alpha) + 245 * alpha);
                d[currentIdx + 3] = 255;
            }
        }

        ctx.putImageData(dstData, 0, 0);
        loadingText.style.visibility = 'hidden';
        saveBtn.disabled = false; // প্রসেসিং শেষ হলে সেভ বাটন আবার এনাবল হবে
    }

    // 💾 ছবি ডাউনলোড ও অ্যান্ড্রয়েডে পাঠানোর ফাংশন
    function saveProcessedImage() {
        if (!originalImage.src) return;
        
        const dataUrl = canvas.toDataURL("image/jpeg", 0.9); // হাই কোয়ালিটি JPEG (90% Quality)

        // ১. ব্রাউজারে বা পিসিতে টেস্ট করার জন্য ডাইরেক্ট ডাউনলোড লজিক
        const downloadLink = document.createElement('a');
        downloadLink.download = 'shagor_chalk_effect_' + Date.now() + '.jpg';
        downloadLink.href = dataUrl;
        downloadLink.click();

        // ২. অ্যান্ড্রয়েড অ্যাপের গ্যালারিতে সরাসরি ফাইল সেভ করার জন্য এপিআই কলব্যাক
        if (window.AndroidInterface && window.AndroidInterface.saveToGallery) {
            window.AndroidInterface.saveToGallery(dataUrl);
        }
    }
</script>

</body>
</html>
