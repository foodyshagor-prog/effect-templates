<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Double Light Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            min-height: 100%;
            min-height: 100dvh;
            background: #07090e;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-y: auto;
        }

        body {
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        header {
            padding: 16px;
            text-align: center;
            background: rgba(7, 9, 14, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        header h1 {
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #f8fafc;
        }

        header span {
            display: block;
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            min-height: 320px;
        }

        .canvas-container {
            width: 100%;
            max-width: 450px;
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #020306;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            display: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .placeholder {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            cursor: pointer;
            padding: 20px;
            text-align: center;
        }

        .placeholder .icon-box {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .placeholder svg {
            width: 32px;
            height: 32px;
            fill: #94a3b8;
        }

        .placeholder p {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .controls-panel {
            background: #0c0f16;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 24px;
            border-radius: 28px 28px 0 0;
            margin-top: auto;
        }

        .color-pickers-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .color-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 8px 12px;
            border-radius: 14px;
            cursor: pointer;
        }

        .color-selector span {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .color-preview {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        .color-preview input[type="color"] {
            position: absolute;
            top: -5px; left: -5px;
            width: 40px; height: 40px;
            cursor: pointer;
            opacity: 0;
        }

        .slider-group {
            margin-bottom: 16px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slider-label span.val {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            cursor: pointer;
            border: 2px solid #38bdf8;
        }

        .presets-row {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .preset-btn {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.05);
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .preset-btn.active {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border-color: #38bdf8;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 14px;
            margin-top: 4px;
        }

        .btn {
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            height: 48px;
            border: none;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-upload {
            background: #1e293b;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-save {
            background: #f8fafc;
            color: #0f172a;
        }

        .btn:active {
            transform: scale(0.97);
        }

        #file-input {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Double Light Studio</h1>
        <span>PRO DUAL GEL LIGHTING EMULATOR</span>
    </header>

    <div class="workspace">
        <div class="canvas-container" id="drop-zone">
            <div class="placeholder" id="placeholder">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-1-14.414L7.707 10.88c-.39.39-1.023.39-1.414 0a.996.996 0 0 1 0-1.414L11.293 4.47a.996.996 0 0 1 1.414 0l5 5a.996.996 0 1 1-1.414 1.414L13 7.586V15c0 .552-.448 1-1 1s-1-.448-1-1V7.586z"/></svg>
                </div>
                <p>Upload portrait background</p>
            </div>
            <canvas id="editorCanvas"></canvas>
        </div>
    </div>

    <div class="controls-panel">
        <div class="color-pickers-row">
            <div class="color-selector">
                <span>Left Light</span>
                <div class="color-preview" id="preview-left" style="background-color: #ff1a40;">
                    <input type="color" id="picker-left" value="#ff1a40">
                </div>
            </div>
            <div class="color-selector">
                <span>Right Light</span>
                <div class="color-preview" id="preview-right" style="background-color: #00f3ff;">
                    <input type="color" id="picker-right" value="#00f3ff">
                </div>
            </div>
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>Glow Intensity</span>
                <span class="val" id="val-intensity">85%</span>
            </div>
            <input type="range" id="slider-intensity" min="30" max="150" value="85" step="5">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>Light Spread & Width</span>
                <span class="val" id="val-spread">50%</span>
            </div>
            <input type="range" id="slider-spread" min="30" max="80" value="50" step="2">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>Ambient Under-Exposure</span>
                <span class="val" id="val-exposure">-20%</span>
            </div>
            <input type="range" id="slider-exposure" min="-60" max="0" value="-20" step="2">
        </div>

        <div class="presets-row">
            <button class="preset-btn active" onclick="loadPreset('#ff1a40', '#00f3ff', this)">Classic Studio (Reference)</button>
            <button class="preset-btn" onclick="loadPreset('#ff00ea', '#00f3ff', this)">Cyberpunk Neon</button>
            <button class="preset-btn" onclick="loadPreset('#ff6a00', '#7a00ff', this)">Sunset Violet</button>
            <button class="preset-btn" onclick="loadPreset('#00ff4c', '#0026ff', this)">Acid Matrix</button>
        </div>

        <div class="action-buttons">
            <button class="btn btn-upload" id="btn-upload">New Image</button>
            <button class="btn btn-save" id="btn-save">Export Artwork</button>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*">

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const placeholder = document.getElementById('placeholder');
        const dropZone = document.getElementById('drop-zone');
        const btnUpload = document.getElementById('btn-upload');
        const btnSave = document.getElementById('btn-save');

        const pickerLeft = document.getElementById('picker-left');
        const pickerRight = document.getElementById('picker-right');
        const previewLeft = document.getElementById('preview-left');
        const previewRight = document.getElementById('preview-right');

        const sliderIntensity = document.getElementById('slider-intensity');
        const sliderSpread = document.getElementById('slider-spread');
        const sliderExposure = document.getElementById('slider-exposure');

        const valIntensity = document.getElementById('val-intensity');
        const valSpread = document.getElementById('val-spread');
        const valExposure = document.getElementById('val-exposure');

        let originalImage = null;

        // Reactive Event listeners
        pickerLeft.addEventListener('input', (e) => { previewLeft.style.backgroundColor = e.target.value; clearPresetActiveState(); renderDoubleLightPipeline(); });
        pickerRight.addEventListener('input', (e) => { previewRight.style.backgroundColor = e.target.value; clearPresetActiveState(); renderDoubleLightPipeline(); });

        sliderIntensity.addEventListener('input', (e) => { valIntensity.innerText = e.target.value + '%'; renderDoubleLightPipeline(); });
        sliderSpread.addEventListener('input', (e) => { valSpread.innerText = e.target.value + '%'; renderDoubleLightPipeline(); });
        sliderExposure.addEventListener('input', (e) => { valExposure.innerText = e.target.value + '%'; renderDoubleLightPipeline(); });

        btnUpload.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('click', () => { if(!originalImage) fileInput.click(); });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage = new Image();
                originalImage.onload = () => {
                    placeholder.style.display = 'none';
                    canvas.style.display = 'block';
                    setupCanvasDimensions();
                    renderDoubleLightPipeline();
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function setupCanvasDimensions() {
            const maxDimension = 650; // Optimized configuration scaling bounds
            let width = originalImage.width;
            let height = originalImage.height;

            if (width > height && width > maxDimension) {
                height = Math.round((height * maxDimension) / width);
                width = maxDimension;
            } else if (height > maxDimension) {
                width = Math.round((width * maxDimension) / height);
                height = maxDimension;
            }
            canvas.width = width;
            canvas.height = height;
        }

        function loadPreset(leftColor, rightColor, buttonElement) {
            pickerLeft.value = leftColor;
            pickerRight.value = rightColor;
            previewLeft.style.backgroundColor = leftColor;
            previewRight.style.backgroundColor = rightColor;
            
            clearPresetActiveState();
            buttonElement.classList.add('active');
            renderDoubleLightPipeline();
        }

        function clearPresetActiveState() {
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
        }

        // Helper conversion function to feed overlay filters securely
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function renderDoubleLightPipeline() {
            if (!originalImage) return;

            const leftColor = pickerLeft.value;
            const rightColor = pickerRight.value;
            const intensity = parseInt(sliderIntensity.value) / 100;
            const spread = parseInt(sliderSpread.value) / 100;
            const exposureShift = 1 + (parseInt(sliderExposure.value) / 100);

            // 1. BASE BACKGROUND PASS: Under-expose and enhance contrast to make the lighting accents stand out
            ctx.filter = `brightness(${exposureShift * 0.95}) contrast(1.18) saturate(0.85)`;
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';

            // 2. TEXTURE CHANNELS GEL PASS (Color mode mapping preserves the beautiful skin details/grain)
            ctx.save();
            ctx.globalCompositeOperation = 'color';
            let splitGrad = ctx.createLinearGradient(0, 0, canvas.width, 0);
            const rgbL = hexToRgb(leftColor);
            const rgbR = hexToRgb(rightColor);
            
            splitGrad.addColorStop(0, `rgba(${rgbL.r}, ${rgbL.g}, ${rgbL.b}, 0.85)`);
            splitGrad.addColorStop(0.4, `rgba(${rgbL.r}, ${rgbL.g}, ${rgbL.b}, 0.15)`);
            splitGrad.addColorStop(0.6, `rgba(${rgbR.r}, ${rgbR.g}, ${rgbR.b}, 0.15)`);
            splitGrad.addColorStop(1, `rgba(${rgbR.r}, ${rgbR.g}, ${rgbR.b}, 0.85)`);
            ctx.fillStyle = splitGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            // 3. LEFT SPECULAR GLOW PASS (Screen blending overlays the glowing illumination onto edge highlights)
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            let leftGlow = ctx.createLinearGradient(0, 0, canvas.width * spread, 0);
            leftGlow.addColorStop(0, `rgba(${rgbL.r}, ${rgbL.g}, ${rgbL.b}, ${intensity * 0.9})`);
            leftGlow.addColorStop(0.5, `rgba(${rgbL.r}, ${rgbL.g}, ${rgbL.b}, ${intensity * 0.35})`);
            leftGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = leftGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            // 4. RIGHT SPECULAR GLOW PASS
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            let rightGlow = ctx.createLinearGradient(canvas.width, 0, canvas.width * (1 - spread), 0);
            rightGlow.addColorStop(0, `rgba(${rgbR.r}, ${rgbR.g}, ${rgbR.b}, ${intensity * 0.9})`);
            rightGlow.addColorStop(0.5, `rgba(${rgbR.r}, ${rgbR.g}, ${rgbR.b}, ${intensity * 0.35})`);
            rightGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = rightGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            // 5. DEEP STUDIO VIGNETTE FINISHER: Enhances the center lighting falloff securely
            ctx.save();
            ctx.globalCompositeOperation = 'multiply';
            let vignette = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, Math.min(canvas.width, canvas.height) * 0.4,
                canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.75
            );
            vignette.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
            vignette.addColorStop(0.6, 'rgba(150, 150, 160, 0.6)');
            vignette.addColorStop(1, 'rgba(15, 20, 30, 1.0)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        btnSave.addEventListener('click', () => {
            if (!originalImage) return;
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = 'double_light_artwork.jpg';
            link.href = dataUrl;
            link.click();
        });
    </script>
</body>
</html>
