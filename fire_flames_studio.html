<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fire & Flames Photo Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            min-height: 100%;
            min-height: 100dvh;
            background: #090b11;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-y: auto;
        }

        body {
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        header {
            padding: 16px;
            text-align: center;
            background: rgba(9, 11, 17, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        header h1 {
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #f8fafc;
        }

        header span {
            display: block;
            font-size: 0.7rem;
            color: #ff6a00;
            letter-spacing: 1.5px;
            margin-top: 4px;
            font-weight: 700;
        }

        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            min-height: 320px;
        }

        .canvas-container {
            width: 100%;
            max-width: 460px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #030407;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            display: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.95);
        }

        .placeholder {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            cursor: pointer;
            padding: 20px;
            text-align: center;
        }

        .placeholder .icon-box {
            width: 64px;
            height: 64px;
            background: rgba(255, 106, 0, 0.05);
            border: 1px solid rgba(255, 106, 0, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .placeholder svg {
            width: 32px;
            height: 32px;
            fill: #ff7823;
        }

        .placeholder p {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .controls-panel {
            background: #0f131e;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 24px;
            border-radius: 28px 28px 0 0;
            margin-top: auto;
        }

        .slider-group {
            margin-bottom: 16px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slider-label span.val {
            background: rgba(255, 106, 0, 0.1);
            color: #ff7823;
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        .slider-label span.val.cyan {
            background: rgba(6, 182, 212, 0.1);
            color: #22d3ee;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            cursor: pointer;
            border: 2px solid #ff6a00;
        }

        #slider-rim::-webkit-slider-thumb {
            border-color: #06b6d4;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 14px;
            margin-top: 20px;
        }

        .btn {
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            height: 48px;
            border: none;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-upload {
            background: #1e293b;
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-save {
            background: #ff6a00;
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(255, 106, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.97);
        }

        #file-input {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Fire & Flames Studio</h1>
        <span>DYNAMIC INFERNO ENGULF PASS</span>
    </header>

    <div class="workspace">
        <div class="canvas-container" id="drop-zone">
            <div class="placeholder" id="placeholder">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M17.66 11.2c-.23-.3-.51-.56-.83-.77-1.01-.67-1.3-1.42-1.3-2.43 0-.6.13-1.12.37-1.57-.69.1-1.32.43-1.8.99-1.39 1.6-1.39 4.23.01 5.82.17.2.36.37.57.52.29.2.4.52.3.85-.1.33-.41.55-.76.53-.2-.01-.4-.06-.58-.15-.32-.17-.66-.25-1.02-.25-.33 0-.65.07-.95.22-.76.38-1.24 1.15-1.24 2.01 0 1.24 1.01 2.25 2.25 2.25h6.16c2.43 0 4.4-1.97 4.4-4.4 0-1.53-.78-2.94-2.08-3.77zm-5.41 7.45c-.41 0-.75-.34-.75-.75s.34-.75.75-.75.75.34.75.75-.34.75-.75.75z"/></svg>
                </div>
                <p>Upload target portrait image</p>
            </div>
            <canvas id="editorCanvas"></canvas>
        </div>
    </div>

    <div class="controls-panel">
        <div class="slider-group">
            <div class="slider-label">
                <span>Flame Intensity & Height</span>
                <span class="val" id="val-flame">75%</span>
            </div>
            <input type="range" id="slider-flame" min="20" max="130" value="75" step="2">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>Teal Rim Backlighting</span>
                <span class="val cyan" id="val-rim">50%</span>
            </div>
            <input type="range" id="slider-rim" min="0" max="100" value="50" step="5">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>Ambient Darkness</span>
                <span class="val" id="val-darkness">35%</span>
            </div>
            <input type="range" id="slider-darkness" min="10" max="70" value="35" step="2">
        </div>

        <div class="slider-group">
            <div class="slider-label">
                <span>Sparks & Embers Density</span>
                <span class="val" id="val-embers">60%</span>
            </div>
            <input type="range" id="slider-embers" min="10" max="120" value="60" step="5">
        </div>

        <div class="action-buttons">
            <button class="btn btn-upload" id="btn-upload">New Portrait</button>
            <button class="btn btn-save" id="btn-save">Export Artwork</button>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*">

    <script>
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const placeholder = document.getElementById('placeholder');
        const dropZone = document.getElementById('drop-zone');
        const btnUpload = document.getElementById('btn-upload');
        const btnSave = document.getElementById('btn-save');

        const sliderFlame = document.getElementById('slider-flame');
        const sliderRim = document.getElementById('slider-rim');
        const sliderDarkness = document.getElementById('slider-darkness');
        const sliderEmbers = document.getElementById('slider-embers');

        const valFlame = document.getElementById('val-flame');
        const valRim = document.getElementById('val-rim');
        const valDarkness = document.getElementById('val-darkness');
        const valEmbers = document.getElementById('val-embers');

        let originalImage = null;
        let flameSeeds = [];
        let sparkSeeds = [];

        // Realtime interaction events
        sliderFlame.addEventListener('input', (e) => { valFlame.innerText = e.target.value + '%'; renderFirePipeline(); });
        sliderRim.addEventListener('input', (e) => { valRim.innerText = e.target.value + '%'; renderFirePipeline(); });
        sliderDarkness.addEventListener('input', (e) => { valDarkness.innerText = e.target.value + '%'; renderFirePipeline(); });
        sliderEmbers.addEventListener('input', (e) => { valEmbers.innerText = e.target.value + '%'; renderFirePipeline(); });

        btnUpload.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('click', () => { if(!originalImage) fileInput.click(); });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage = new Image();
                originalImage.onload = () => {
                    placeholder.style.display = 'none';
                    canvas.style.display = 'block';
                    setupCanvasDimensions();
                    generateDeterministicSeeds();
                    renderFirePipeline();
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function setupCanvasDimensions() {
            const maxDimension = 700;
            let width = originalImage.width;
            let height = originalImage.height;

            if (width > height && width > maxDimension) {
                height = Math.round((height * maxDimension) / width);
                width = maxDimension;
            } else if (height > maxDimension) {
                width = Math.round((width * maxDimension) / height);
                height = maxDimension;
            }
            canvas.width = width;
            canvas.height = height;
        }

        function generateDeterministicSeeds() {
            flameSeeds = [];
            sparkSeeds = [];
            
            // Generate dense procedural flame positions
            const totalFlameTongues = 45;
            for(let i = 0; i <= totalFlameTongues; i++) {
                flameSeeds.push({
                    xRatio: i / totalFlameTongues,
                    heightModifier: 0.4 + Math.random() * 0.6,
                    curveWobble1: (Math.random() - 0.5) * 40,
                    curveWobble2: (Math.random() - 0.5) * 25,
                    widthBase: 25 + Math.random() * 35
                });
            }

            // Generate crisp hot ember coordinates
            for(let i = 0; i < 120; i++) {
                sparkSeeds.push({
                    xRatio: 0.05 + Math.random() * 0.9,
                    yRatio: 0.2 + Math.random() * 0.75,
                    radius: 0.8 + Math.random() * 2.2,
                    alpha: 0.3 + Math.random() * 0.6
                });
            }
        }

        function renderFirePipeline() {
            if (!originalImage) return;

            const flameIntensity = parseInt(sliderFlame.value) / 100;
            const rimIntensity = parseInt(sliderRim.value) / 100;
            const ambientDarkness = 1 - (parseInt(sliderDarkness.value) / 100);
            const emberDensity = parseInt(sliderEmbers.value) / 100;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. BASE PASS: Darken background environment and elevate contrasts to match cinematic reference
            ctx.filter = `brightness(${ambientDarkness * 0.9}) contrast(1.22) saturate(0.9)`;
            ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';

            // 2. THE TEAL RIM-LIGHT PASS (Emulates high-end movie-poster dual styling)
            if (rimIntensity > 0) {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                
                // Left Edge Cool Overlay Accent
                let leftRim = ctx.createLinearGradient(0, 0, canvas.width * 0.25, 0);
                leftRim.addColorStop(0, `rgba(6, 182, 212, ${0.45 * rimIntensity})`);
                leftRim.addColorStop(0.3, `rgba(6, 182, 212, ${0.15 * rimIntensity})`);
                leftRim.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = leftRim;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Right Edge Cool Overlay Accent
                let rightRim = ctx.createLinearGradient(canvas.width, 0, canvas.width * 0.75, 0);
                rightRim.addColorStop(0, `rgba(6, 182, 212, ${0.45 * rimIntensity})`);
                rightRim.addColorStop(0.3, `rgba(6, 182, 212, ${0.15 * rimIntensity})`);
                rightRim.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = rightRim;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.restore();
            }

            // 3. THERMAL UNDER-GLOW PASS: Creates the vibrant bounce illumination hitting chin and neck lines
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            let thermalGlow = ctx.createLinearGradient(0, canvas.height, 0, canvas.height * 0.3);
            thermalGlow.addColorStop(0, `rgba(255, 66, 0, ${0.6 * flameIntensity})`);
            thermalGlow.addColorStop(0.5, `rgba(255, 110, 0, ${0.25 * flameIntensity})`);
            thermalGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = thermalGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            // 4. MULTI-LAYERED PROCEDURAL FLAMES GENERATOR
            ctx.save();
            ctx.globalCompositeOperation = 'screen';

            // Sub-Pass A: Deep Outer Inferno Layer (Red/Crimson foundation)
            drawFlameLayer(flameSeeds, flameIntensity * 1.1, 1.0, (seed, x, y, h) => {
                let g = ctx.createLinearGradient(x, y, x, y - h);
                g.addColorStop(0, 'rgba(210, 20, 0, 0.8)');
                g.addColorStop(0.5, 'rgba(180, 40, 0, 0.4)');
                g.addColorStop(1, 'rgba(0, 0, 0, 0)');
                return g;
            });

            // Sub-Pass B: Mid-Core Core Fire Layer (Rich Orange body)
            drawFlameLayer(flameSeeds, flameIntensity, 0.78, (seed, x, y, h) => {
                let g = ctx.createLinearGradient(x, y, x, y - h);
                g.addColorStop(0, 'rgba(255, 100, 0, 0.95)');
                g.addColorStop(0.4, 'rgba(235, 130, 0, 0.5)');
                g.addColorStop(1, 'rgba(0, 0, 0, 0)');
                return g;
            });

            // Sub-Pass C: Bright White-Hot Focus Layer (Yellow/White core strands matching image)
            drawFlameLayer(flameSeeds, flameIntensity * 0.85, 0.52, (seed, x, y, h) => {
                let g = ctx.createLinearGradient(x, y, x, y - h);
                g.addColorStop(0, 'rgba(255, 240, 180, 1.0)');
                g.addColorStop(0.3, 'rgba(255, 200, 0, 0.7)');
                g.addColorStop(1, 'rgba(0, 0, 0, 0)');
                return g;
            });

            ctx.restore();

            // 5. RISING EMBERS & METEORIC SPARKS PASS
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            const sparksToRender = Math.floor(sparkSeeds.length * emberDensity);
            
            for(let i = 0; i < sparksToRender; i++) {
                const p = sparkSeeds[i];
                const px = p.xRatio * canvas.width;
                // Scale altitude distribution to cluster dense towards the bottom fire source
                const py = canvas.height - (p.yRatio * canvas.height * (0.4 + flameIntensity * 0.6));
                
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, ${160 + Math.random()*75}, 40, ${p.alpha})`;
                ctx.shadowBlur = p.radius * 2;
                ctx.shadowColor = 'rgba(255,110,0,0.6)';
                ctx.arc(px, py, p.radius, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.restore();

            // 6. DARK PERIMETER VINNETE PASS: Keeps focus dead center on the illuminated expression
            ctx.save();
            ctx.globalCompositeOperation = 'multiply';
            let vignette = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, Math.min(canvas.width, canvas.height) * 0.4,
                canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * 0.85
            );
            vignette.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
            vignette.addColorStop(0.6, 'rgba(160, 160, 170, 0.7)');
            vignette.addColorStop(1, 'rgba(10, 12, 18, 1.0)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        function drawFlameLayer(seeds, overallScale, heightFactor, gradientStyleFactory) {
            const baseLineY = canvas.height + 10;
            const targetMaxHeight = canvas.height * 0.55 * overallScale * heightFactor;

            seeds.forEach(seed => {
                const currentX = seed.xRatio * canvas.width;
                const currentHeight = targetMaxHeight * seed.heightModifier;

                ctx.beginPath();
                ctx.moveTo(currentX - seed.widthBase * heightFactor, baseLineY);
                
                // Procedural bezier structure handles complex wave profiles dynamically
                ctx.bezierCurveTo(
                    currentX - seed.widthBase * 0.3 + seed.curveWobble1, baseLineY - currentHeight * 0.3,
                    currentX + seed.curveWobble2, baseLineY - currentHeight * 0.6,
                    currentX + (seed.curveWobble1 * 0.2), baseLineY - currentHeight
                );

                ctx.bezierCurveTo(
                    currentX + seed.curveWobble1 * 0.5, baseLineY - currentHeight * 0.5,
                    currentX + seed.widthBase * 0.3 + seed.curveWobble2, baseLineY - currentHeight * 0.2,
                    currentX + seed.widthBase * heightFactor, baseLineY
                );

                ctx.closePath();
                ctx.fillStyle = gradientStyleFactory(seed, currentX, baseLineY, currentHeight);
                ctx.fill();
            });
        }

        btnSave.addEventListener('click', () => {
            if (!originalImage) return;
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            const link = document.createElement('a');
            link.download = 'fire_flames_artwork.jpg';
            link.href = dataUrl;
            link.click();
        });
    </script>
</body>
</html>
